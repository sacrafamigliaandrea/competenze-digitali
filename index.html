/* ===== RENDER ===== */
var Render = (function(){
  var SCHERMATE = {
    video:          function(){ return Video.html(); },
    identificazione:function(){ return Identificazione.html(); },
    consegna:       function(){ return Consegna.html(); },
    prova:          function(){ return provaHtml(); },
    conferma:       function(){ return Conferma.html(); },
    restituzione:   function(){ return Restituzione.html(); }
  };
  var LEGA = {
    video:          function(){ Video.monta(); Video.lega(); },
    identificazione:function(){ Identificazione.lega(); },
    consegna:       function(){ Consegna.lega(); },
    prova:          legaProva,
    conferma:       function(){ Conferma.lega(); },
    restituzione:   function(){ Restituzione.lega(); }
  };

  function disegna(){
    // durante l'autotest Stato.iniziaProva() chiama vaiA("prova") che richiama questa
    // funzione: senza questa guardia il render sovrascriverebbe il report dell'autotest
    // mentre i test sono ancora in corso di esecuzione.
    if(location.search.indexOf("selftest=1") !== -1) return;
    var nome = Stato.s.schermata;
    document.getElementById("app").innerHTML =
      '<div class="schermata"><div class="wrap">' + SCHERMATE[nome]() + '</div></div>';
    LEGA[nome]();
    window.scrollTo(0, 0);
  }

  return {disegna:disegna};
})();

function provaHtml(){
  var i = Stato.s.corrente;
  return '<div class="card">' + itemHtml(i) + '</div>' +
         '<div class="card">' + mappaHtml() +
         '<div class="navprova">' +
           '<button class="btn secondario" id="prec"' +
             (i === 0 ? " disabled" : "") + '>Domanda precedente</button>' +
           '<button class="btn secondario" id="succ"' +
             (i === ITEMS.length - 1 ? " disabled" : "") + '>Domanda successiva</button>' +
           '<button class="btn" id="vaiConferma">Vai alla consegna</button>' +
         '</div></div>';
}

function legaProva(){
  var i = Stato.s.corrente;

  // scelta di un'opzione, sia testuale sia hotspot: entrambe portano data-logico
  var scelte = document.querySelectorAll("[data-logico]");
  for(var k=0;k<scelte.length;k++){
    scelte[k].addEventListener("click", function(){
      Stato.rispondi(i, parseInt(this.getAttribute("data-logico"), 10));
      Render.disegna();
    });
  }

  var salti = document.querySelectorAll("[data-vai]");
  for(var j=0;j<salti.length;j++){
    salti[j].addEventListener("click", function(){
      Stato.s.corrente = parseInt(this.getAttribute("data-vai"), 10);
      Render.disegna();
    });
  }

  document.getElementById("prec").addEventListener("click", function(){
    if(Stato.s.corrente > 0){ Stato.s.corrente--; Render.disegna(); }
  });
  document.getElementById("succ").addEventListener("click", function(){
    if(Stato.s.corrente < ITEMS.length - 1){ Stato.s.corrente++; Render.disegna(); }
  });
  document.getElementById("vaiConferma").addEventListener("click", function(){
    Stato.vaiA("conferma");
  });
}

/* ===== CONFERMA ===== */
var Conferma = (function(){

  // indici (0-based) delle domande rimaste in bianco
  function mancanti(){
    var m = [];
    for(var i=0;i<ITEMS.length;i++)
      if(Stato.s.risposte[i] === null || Stato.s.risposte[i] === undefined) m.push(i);
    return m;
  }

  function html(){
    var m = mancanti();
    var h = '<div class="card"><h2>Prima di consegnare</h2>';

    if(m.length > 0){
      // ambra, mai rosso: segnala senza colpevolizzare, e dice QUALI domande sono
      // rimaste in bianco così lo studente non deve ricontrollarle tutte a mano
      h += '<div class="avviso avviso-ambra">' +
           '<span><strong>' + (m.length === 1 ?
             'C\'è 1 domanda senza risposta.' :
             'Ci sono ' + m.length + ' domande senza risposta.') +
           '</strong> Puoi tornare indietro e completarle: una domanda lasciata in bianco ' +
           'conta come non risposta. Tocca un numero per andare direttamente lì.</span>' +
           '<div class="mancanti">';
      for(var k=0;k<m.length;k++){
        h += '<button class="q" data-vai="' + m[k] + '" ' +
             'aria-label="Vai alla domanda ' + (m[k]+1) + ', rimasta senza risposta">' +
             (m[k]+1) + '</button>';
      }
      h += '</div></div>';
    } else {
      h += '<p class="lead">Hai risposto a tutte e 32 le domande.</p>';
    }

    h += '<p>Una volta consegnato non si torna indietro. Riceverai subito il tuo livello ' +
         'e la spiegazione delle domande su cui il ragionamento si è inceppato.</p>';
    h += '<p><button class="btn secondario" id="torna">Torna alle domande</button> ' +
         '<button class="btn" id="consegna">Consegna la prova</button></p></div>';
    return h;
  }

  function lega(){
    // stesso meccanismo data-vai della mappa in legaProva
    var salti = document.querySelectorAll("[data-vai]");
    for(var j=0;j<salti.length;j++){
      salti[j].addEventListener("click", function(){
        Stato.s.corrente = parseInt(this.getAttribute("data-vai"), 10);
        Stato.vaiA("prova");
      });
    }
    document.getElementById("torna").addEventListener("click", function(){
      Stato.vaiA("prova");
    });
    document.getElementById("consegna").addEventListener("click", function(){
      Stato.chiudi();
      Export.invia(Stato.risultato());
      Stato.vaiA("restituzione");
    });
  }

  return {html:html, lega:lega, mancanti:mancanti};
})();

// Trasporto a pixel GET verso Apps Script: niente CORS, funziona anche con CSP
// restrittiva. Lo schema del foglio e le istruzioni di deploy stanno in apps-script.gs.
var Export = (function(){
  var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbym1ORSyJd-F4ysZnAg7DzAIJBU4e57reXlAxIlNV0u3v8aR4hBz8wRfdk7VxrViNiN/exec";

  function invia(r){
    // finché il docente non ha incollato l'URL della distribuzione, l'invio è un no-op:
    // la prova deve funzionare comunque, senza errori in console
    if(URL_SCRIPT.indexOf("INCOLLA") === 0) return;

    var p = new URLSearchParams();
    p.set("ts", new Date().toISOString());
    p.set("nome", Stato.dati.nome);
    p.set("cognome", Stato.dati.cognome);
    p.set("classe", Stato.dati.classe);
    p.set("durata", String(r.durata));
    // le opzioni sono mescolate per studente: nel foglio va l'INDICE LOGICO (la
    // posizione originale dell'opzione), non la lettera vista a schermo, altrimenti
    // due tentativi non sono confrontabili
    p.set("risposte", Stato.s.risposte.map(function(x){
      return (x === null || x === undefined) ? "-" : String(x);
    }).join(""));
    p.set("esiti", r.esiti.join(""));
    p.set("liv_a1", r.aree[1]);
    p.set("liv_a2", r.aree[2]);
    p.set("liv_a3", r.aree[3]);
    p.set("liv_a4", r.aree[4]);
    p.set("liv_glob", r.globale);

    new Image().src = URL_SCRIPT + "?" + p.toString();
  }

  return {invia:invia};
})();

/* ===== RESTITUZIONE ===== */
var Restituzione = (function(){

  // il nome è testo digitato dallo studente: va nell'HTML, quindi va neutralizzato
  function esc(t){
    return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function badge(liv){
    var cls = liv === "Avanzato" ? "av" :
              liv === "Intermedio" ? "in" :
              liv === "Base" ? "ba" : "pa";
    return '<span class="livello ' + cls + '">' + liv + '</span>';
  }

  // sta qui e non fuori: la revisione ha un solo consumatore, la restituzione
  function revisioneHtml(r){
    var h = '<div class="card"><h2>Le domande da rivedere</h2>';
    var quante = 0, i;
    for(i=0;i<ITEMS.length;i++) if(!r.esiti[i]) quante++;

    if(!quante) return h + '<p class="lead">Tutte le risposte sono corrette. ' +
                            'Non c\'è nulla da rivedere.</p></div>';

    h += '<p class="lead">Sono ' + quante + '. Per ognuna trovi che cosa non ha funzionato ' +
         'e perché la risposta corretta è quella.</p>';

    for(i=0;i<ITEMS.length;i++){
      if(r.esiti[i]) continue;
      var it = ITEMS[i];
      var data = Stato.s.risposte[i];
      if(data === undefined) data = null;

      h += '<div class="rev"><div class="split">';
      h += '<div><span class="tag">Domanda ' + (i+1) + ' · ' + nomeArea(it.area) + '</span>';
      if(it.inquadramento) h += '<div class="inquadramento">' + it.inquadramento + '</div>';
      h += '<p class="domanda">' + it.consegna + '</p>';

      if(data === null){
        h += '<p class="tua tua-vuota"><span>Questa domanda è rimasta senza risposta.</span></p>';
      } else {
        h += '<p class="tua"><strong>La tua risposta:</strong> ' + it.opzioni[data] +
             '<br><span class="perche">' + it.misconcetti[data] + '</span></p>';
      }
      h += '<p class="giusta"><strong>Risposta corretta:</strong> ' +
           it.opzioni[it.corretta] + '</p>';
      h += '<p class="spiega">' + it.feedback + '</p></div>';
      // true = pannello ESPLICATIVO: lo stimolo mostra le note che durante la prova
      // erano nascoste. È il perno didattico della restituzione.
      h += '<aside class="stimolo"><h3>' + it.stimolo.titolo + '</h3>' +
           STIMOLI[it.stimolo.render](true) + '</aside>';
      h += '</div></div>';
    }
    return h + '</div>';
  }

  function html(){
    var r = Stato.risultato();
    var h = '<div class="card"><h2>Il tuo livello</h2>' +
            '<p class="lead">' + esc(Stato.dati.nome) + ' ' + esc(Stato.dati.cognome) +
            ' · classe ' + esc(Stato.dati.classe) + '</p>' +
            '<div class="livello-grande">' + badge(r.globale) + '</div>' +
            '<p>Questo non è un voto: è il livello di competenza che questa prova ha ' +
            'messo in evidenza oggi. La prova si può ripetere: serve a vedere come cresci.</p>' +
            '</div>';

    h += '<div class="card"><h2>Le quattro aree</h2><div class="aree">';
    for(var a=1;a<=4;a++){
      var c = Stato.conteggi(a);
      h += '<div class="area-box"><h3>' + nomeArea(a) + '</h3>' +
           badge(r.aree[a]) +
           '<p class="dettaglio">Base ' + c.Base + '/3 · Intermedio ' + c.Intermedio +
           '/3 · Avanzato ' + c.Avanzato + '/2</p></div>';
    }
    h += '</div>' +
         '<p class="nota">Con 8 domande per area, il livello di area è un\'<strong>indicazione' +
         '</strong> su dove conviene lavorare, non una misura precisa. Il livello complessivo ' +
         'qui sopra è più solido.</p></div>';

    h += revisioneHtml(r);

    // la restituzione è lunga e si legge una volta sola: il rilancio sta in fondo,
    // dove il ragazzo arriva dopo aver letto tutto
    h += '<div class="card ricomincia"><h2>Rifare la prova</h2>' +
         '<p class="lead">La prova si può ripetere durante l\'anno. Ricominciando, le domande ' +
         'restano le stesse ma le risposte vengono rimescolate.</p>' +
         '<p><button class="btn" id="ricomincia">Ricomincia da capo</button></p></div>';

    return h;
  }

  function lega(){
    document.getElementById("ricomincia").addEventListener("click", function(){
      // Stato.dati è esposto per riferimento: vanno azzerate le proprietà, non
      // riassegnato l'oggetto, altrimenti Stato.dati punterebbe al vecchio
      Stato.dati.nome = "";
      Stato.dati.cognome = "";
      Stato.dati.classe = "";
      Stato.s.permutazioni = [];
      Stato.s.risposte = [];
      Stato.s.corrente = 0;
      Stato.s.inizio = 0;
      Stato.s.fine = 0;
      Stato.vaiA("identificazione");
    });
  }

  return {html:html, lega:lega};
})();

/* ===== SELFTEST ===== */
var SelfTest = (function(){
  var casi = [];
  function test(nome, fn){ casi.push({nome:nome, fn:fn}); }
  function assert(cond, msg){ if(!cond) throw new Error(msg || "asserzione fallita"); }
  function assertEq(a, b, msg){
    if(a !== b) throw new Error((msg||"") + " — atteso " + b + ", ottenuto " + a);
  }

  /* --- integrità dell'array ITEMS --- */
  test("ITEMS contiene 32 item", function(){
    assertEq(ITEMS.length, 32, "numero di item");
  });

  test("gli id vanno da 1 a 32 senza buchi né doppioni", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var visti = {};
    for(var i=0;i<ITEMS.length;i++){
      var id = ITEMS[i].id;
      assert(id >= 1 && id <= 32, "id fuori intervallo: " + id);
      assert(!visti[id], "id duplicato: " + id);
      visti[id] = true;
    }
  });

  test("ogni area ha 8 item", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var conta = {1:0,2:0,3:0,4:0};
    for(var i=0;i<ITEMS.length;i++) conta[ITEMS[i].area]++;
    for(var a=1;a<=4;a++) assertEq(conta[a], 8, "item nell'area " + a);
  });

  test("ogni area ha 3 Base, 3 Intermedio, 2 Avanzato", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    for(var a=1;a<=4;a++){
      var c = {Base:0, Intermedio:0, Avanzato:0};
      for(var i=0;i<ITEMS.length;i++) if(ITEMS[i].area===a) c[ITEMS[i].livello]++;
      assertEq(c.Base, 3, "Base nell'area " + a);
      assertEq(c.Intermedio, 3, "Intermedio nell'area " + a);
      assertEq(c.Avanzato, 2, "Avanzato nell'area " + a);
    }
  });

  test("14 item di Conoscenza e 18 di Abilità", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var c = 0, ab = 0;
    for(var i=0;i<ITEMS.length;i++){
      if(ITEMS[i].oggetto === "Conoscenza") c++;
      else if(ITEMS[i].oggetto === "Abilità") ab++;
      else throw new Error("oggetto non valido sull'item " + ITEMS[i].id);
    }
    assertEq(c, 14, "item di Conoscenza");
    assertEq(ab, 18, "item di Abilità");
  });

  test("tutte e 15 le dimensioni sono coperte", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var attese = ["1.1","1.2","1.3","2.1","2.2","2.3","2.4","2.5","2.6",
                  "3.1","3.2","3.3","3.4","4.1","4.2"];
    var viste = {};
    for(var i=0;i<ITEMS.length;i++) viste[ITEMS[i].dim] = true;
    for(var j=0;j<attese.length;j++)
      assert(viste[attese[j]], "dimensione mai usata: " + attese[j]);
  });

  test("ogni item ha 4 opzioni piene e una sola corretta", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    for(var i=0;i<ITEMS.length;i++){
      var it = ITEMS[i];
      assertEq(it.opzioni.length, 4, "opzioni sull'item " + it.id);
      for(var k=0;k<4;k++)
        assert(it.opzioni[k] && it.opzioni[k].length > 3,
               "opzione vuota o troppo corta sull'item " + it.id + ", posizione " + k);
      assert(it.corretta >= 0 && it.corretta <= 3,
             "indice corretto fuori intervallo sull'item " + it.id);
    }
  });

  test("nessun item ha due opzioni sovrapponibili", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    function norm(s){
      return s.toLowerCase().replace(/[^a-zà-ù0-9 ]/g," ").replace(/\s+/g," ").trim();
    }
    for(var i=0;i<ITEMS.length;i++){
      var o = ITEMS[i].opzioni;
      for(var a=0;a<4;a++) for(var b=a+1;b<4;b++)
        assert(norm(o[a]) !== norm(o[b]),
               "opzioni identiche sull'item " + ITEMS[i].id + ": " + a + " e " + b);
    }
  });

  test("ogni distrattore ha il suo misconcetto, la corretta no", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    for(var i=0;i<ITEMS.length;i++){
      var it = ITEMS[i];
      assertEq(it.misconcetti.length, 4, "misconcetti sull'item " + it.id);
      for(var k=0;k<4;k++){
        if(k === it.corretta)
          assert(it.misconcetti[k] === null,
                 "la corretta dell'item " + it.id + " non deve avere misconcetto");
        else
          assert(it.misconcetti[k] && it.misconcetti[k].length > 10,
                 "misconcetto mancante sull'item " + it.id + ", opzione " + k);
      }
    }
  });

  test("ogni item ha consegna, stimolo e feedback", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    for(var i=0;i<ITEMS.length;i++){
      var it = ITEMS[i];
      assert(it.consegna && it.consegna.length > 15, "consegna sull'item " + it.id);
      assert(it.stimolo && (it.stimolo.tipo === "svg" || it.stimolo.tipo === "mockup"),
             "stimolo non valido sull'item " + it.id);
      assert(typeof STIMOLI[it.stimolo.render] === "function",
             "funzione di stimolo mancante: " + it.stimolo.render + " (item " + it.id + ")");
      assert(it.feedback && it.feedback.length > 30, "feedback sull'item " + it.id);
    }
  });

  test("i tre item con inquadramento sono 9, 17, 31", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var conInq = [];
    for(var i=0;i<ITEMS.length;i++)
      if(ITEMS[i].inquadramento) conInq.push(ITEMS[i].id);
    conInq.sort(function(a,b){return a-b;});
    assertEq(conInq.join(","), "9,17,31", "item con inquadramento esteso");
  });

  /* --- calcolo dei livelli --- */
  test("scaletta globale: nessuna soglia raggiunta → In via di prima acquisizione", function(){
    var r = Livelli.globale({Base:7, Intermedio:12, Avanzato:8});
    assertEq(r, "In via di prima acquisizione", "livello globale");
  });

  test("scaletta globale: solo Base → Base", function(){
    assertEq(Livelli.globale({Base:8, Intermedio:7, Avanzato:8}), "Base", "livello globale");
  });

  test("scaletta globale: Base e Intermedio → Intermedio", function(){
    assertEq(Livelli.globale({Base:8, Intermedio:8, Avanzato:5}), "Intermedio", "livello globale");
  });

  test("scaletta globale: tutte le soglie → Avanzato", function(){
    assertEq(Livelli.globale({Base:8, Intermedio:8, Avanzato:6}), "Avanzato", "livello globale");
  });

  test("la scaletta è cumulativa: Avanzato pieno senza Base resta In via di prima acquisizione", function(){
    assertEq(Livelli.globale({Base:5, Intermedio:12, Avanzato:8}),
             "In via di prima acquisizione",
             "un punteggio alto sui difficili non scavalca la soglia Base");
  });

  test("scaletta di area: soglie 2/3 e 2/2", function(){
    assertEq(Livelli.area({Base:1, Intermedio:3, Avanzato:2}), "In via di prima acquisizione", "area");
    assertEq(Livelli.area({Base:2, Intermedio:1, Avanzato:2}), "Base", "area");
    assertEq(Livelli.area({Base:2, Intermedio:2, Avanzato:1}), "Intermedio", "area");
    assertEq(Livelli.area({Base:3, Intermedio:3, Avanzato:2}), "Avanzato", "area");
  });

  test("i quattro esiti sono tutti raggiungibili con item reali", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var scenari = [
      {nome:"tutte giuste",  filtro:function(){ return true; },  atteso:"Avanzato"},
      {nome:"solo Base e Intermedio", filtro:function(it){ return it.livello !== "Avanzato"; },
       atteso:"Intermedio"},
      {nome:"solo Base",     filtro:function(it){ return it.livello === "Base"; }, atteso:"Base"},
      {nome:"niente",        filtro:function(){ return false; },
       atteso:"In via di prima acquisizione"}
    ];
    for(var s=0;s<scenari.length;s++){
      var c = {Base:0, Intermedio:0, Avanzato:0};
      for(var i=0;i<ITEMS.length;i++)
        if(scenari[s].filtro(ITEMS[i])) c[ITEMS[i].livello]++;
      assertEq(Livelli.globale(c), scenari[s].atteso, "scenario: " + scenari[s].nome);
    }
  });

  /* --- shuffle --- */
  test("lo shuffle restituisce una permutazione di 0,1,2,3", function(){
    for(var s=0;s<200;s++){
      var p = Shuffle.permuta(4, s);
      assertEq(p.length, 4, "lunghezza permutazione");
      var visti = [false,false,false,false];
      for(var i=0;i<4;i++){
        assert(p[i] >= 0 && p[i] <= 3, "valore fuori intervallo nel seed " + s);
        assert(!visti[p[i]], "valore ripetuto nel seed " + s);
        visti[p[i]] = true;
      }
    }
  });

  test("lo stesso seed produce sempre la stessa permutazione", function(){
    assertEq(Shuffle.permuta(4, 42).join(","), Shuffle.permuta(4, 42).join(","),
             "determinismo dello shuffle");
  });

  test("seed diversi producono permutazioni diverse almeno il 60% delle volte", function(){
    var base = Shuffle.permuta(4, 1).join(",");
    var diversi = 0;
    for(var s=2;s<=100;s++) if(Shuffle.permuta(4, s).join(",") !== base) diversi++;
    assert(diversi >= 60, "shuffle troppo poco vario: solo " + diversi + " su 99");
  });

  test("l'indice logico si ritrova sempre dopo lo shuffle", function(){
    for(var s=0;s<500;s++){
      var p = Shuffle.permuta(4, s);          // p[posizioneMostrata] = indiceLogico
      for(var logico=0;logico<4;logico++){
        var mostrata = Shuffle.posizioneDi(p, logico);
        assertEq(p[mostrata], logico,
                 "andata e ritorno rotta: seed " + s + ", logico " + logico);
      }
    }
  });

  /* --- stato della prova --- */
  test("il risultato riflette le risposte date", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    Stato.iniziaProva();
    for(var i=0;i<ITEMS.length;i++)
      if(ITEMS[i].livello === "Base") Stato.rispondi(i, ITEMS[i].corretta);
    Stato.chiudi();
    var r = Stato.risultato();
    assertEq(r.globale, "Base", "solo i Base corretti → livello Base");
    assertEq(Stato.contaRisposte(), 12, "risposte registrate");
  });

  /* --- hotspot --- */
  test("gli item con hotspot hanno comunque 4 opzioni descrittive", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    for(var i=0;i<ITEMS.length;i++){
      var it = ITEMS[i];
      if(it.stimolo.hotspot){
        assertEq(it.opzioni.length, 4, "opzioni sull'item hotspot " + it.id);
        assertEq(it.stimolo.tipo, "mockup", "un hotspot vive solo dentro un mockup, item " + it.id);
      }
    }
  });

  /* --- scorciatoie da test: la risposta giusta non deve essere indovinabile --- */
  // "quando non sai, scegli la più lunga" è l'euristica più insegnata nei corsi per i
  // test: se la corretta è sistematicamente la più lunga, la prova misura la scaltrezza
  // invece della competenza. Lo shuffle non protegge: la lunghezza non cambia permutando.
  test("la corretta non è quasi sempre l'opzione più lunga", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var quanti = 0;
    for(var i=0;i<ITEMS.length;i++){
      var L = [], k;
      for(k=0;k<4;k++) L.push(ITEMS[i].opzioni[k].length);
      var max = Math.max.apply(null, L), min = Math.min.apply(null, L);
      if(L[ITEMS[i].corretta] === max) quanti++;
      assert((max - min) / min <= 0.25,
             "opzioni troppo squilibrate sull'item " + ITEMS[i].id +
             ": da " + min + " a " + max + " caratteri");
    }
    assert(quanti <= 8, "la corretta è l'opzione più lunga in " + quanti +
           " item su 32: è la scorciatoia che si insegna nei corsi per i test");
  });

  // negli item con hotspot le opzioni NON vengono mescolate: l'ordine con cui gli
  // elementi compaiono nel mockup è fisso, quindi va contata la posizione VISIVA —
  // l'ordine dei data-logico nell'HTML prodotto — e non l'indice logico dell'array.
  test("negli item con hotspot la posizione corretta è distribuita", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    var d = [0,0,0,0], n = 0, i, j;
    for(i=0;i<ITEMS.length;i++){
      var it = ITEMS[i];
      if(!it.stimolo.hotspot) continue;
      n++;
      var html = STIMOLI[it.stimolo.render](false);
      var logici = [], re = /data-logico="(\d+)"/g, m;
      while((m = re.exec(html)) !== null) logici.push(parseInt(m[1], 10));
      assertEq(logici.length, 4,
               "il mockup dell'item " + it.id + " deve disegnare 4 hotspot");
      var ordinati = logici.slice().sort();
      assertEq(ordinati.join(","), "0,1,2,3",
               "i data-logico dell'item " + it.id + " non coprono 0,1,2,3");
      var pos = -1;
      for(j=0;j<4;j++) if(logici[j] === it.corretta) pos = j;
      assert(pos !== -1, "l'hotspot corretto manca dal mockup dell'item " + it.id);
      d[pos]++;
    }
    assert(n >= 10, "item con hotspot attesi: almeno 10, trovati " + n);
    for(j=0;j<4;j++)
      assert(d[j] <= Math.ceil(n/2),
             "troppe corrette nella posizione visiva " + j +
             " (" + d[j] + " su " + n + "): distribuzione " + d.join("/"));
  });

  /* --- export --- */
  // se questa mappa si rompe il foglio si riempie di dati sbagliati in silenzio
  test("l'export registra l'indice logico, non la lettera mostrata", function(){
    assert(ITEMS.length > 0, "ITEMS è vuoto: gli altri test non significano nulla");
    Stato.iniziaProva();
    var i = 0;
    var p = Stato.s.permutazioni[i];
    var posMostrata = 2;                       // lo studente tocca la lettera C
    var logico = p[posMostrata];
    Stato.rispondi(i, logico);
    assertEq(Stato.s.risposte[i], logico,
             "in stato va l'indice logico, non la posizione " + posMostrata);

    Stato.rispondi(i, ITEMS[i].corretta);
    assertEq(Stato.esiti()[i], 1, "la risposta corretta deve risultare corretta");

    var sbagliato = (ITEMS[i].corretta + 1) % 4;
    Stato.rispondi(i, sbagliato);
    assertEq(Stato.esiti()[i], 0, "una risposta diversa dalla corretta non deve valere");
  });

  function esegui(){
    var ok = 0, ko = [];
    for(var i=0;i<casi.length;i++){
      try{ casi[i].fn(); ok++; }
      catch(e){ ko.push({nome:casi[i].nome, err:e.message}); }
    }
    return {ok:ok, ko:ko, totale:casi.length};
  }

  function mostra(){
    var r = esegui();
    var html = '<div style="max-width:900px;margin:32px auto;padding:0 20px">';
    html += '<h1>Autotest — ' + r.ok + '/' + r.totale + '</h1>';
    if(!r.ko.length){
      html += '<p style="color:#1B6D3F;font-weight:700">Tutto verde.</p>';
    } else {
      for(var i=0;i<r.ko.length;i++){
        html += '<div style="border-left:4px solid #B8860B;background:#fff;padding:10px 14px;margin:10px 0">' +
                '<strong>' + r.ko[i].nome + '</strong><br>' + r.ko[i].err + '</div>';
      }
    }
    html += '</div>';
    document.getElementById("app").innerHTML = html;
  }

  return {test:test, assert:assert, assertEq:assertEq, esegui:esegui, mostra:mostra};
})();

if(location.search.indexOf("selftest=1") !== -1){
  document.addEventListener("DOMContentLoaded", SelfTest.mostra);
}
</script>
