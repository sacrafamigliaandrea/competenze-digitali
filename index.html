<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Competenze digitali — Prova finale</title>
<link rel="icon" href="logo.svg" />
<link rel="apple-touch-icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ===== TOKEN ===== */
:root{
  --blu:#123E90;
  --blu-chiaro:#1f5fc0;
  --blu-tenue:#eef2fb;
  --bordo:#d6e1f2;
  --ambra:#B8860B;
  --ambra-chiara:#D4A017;
  --verde:#1B6D3F;
  --testo:#16233a;
  --testo-tenue:#5a6b7c;
  --carta:#ffffff;
  --fondo:#f6f8fc;
  --raggio:14px;
  --ombra:0 6px 18px rgba(18,62,144,.14);
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--fondo);color:var(--testo);
  font-family:"Atkinson Hyperlegible",system-ui,sans-serif;font-size:18px;line-height:1.55;
}
h1,h2,h3{font-family:"Lexend",system-ui,sans-serif;color:var(--blu);margin:0 0 .5em}

/* ===== SHELL ===== */
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}
header.top{
  background:var(--blu);color:#fff;padding:14px 0;
  box-shadow:0 2px 10px rgba(18,62,144,.25)
}
header.top .wrap{display:flex;align-items:center;gap:14px}
header.top .marchio{display:flex;align-items:center;gap:12px}
header.top svg.logo{width:38px;height:38px;flex:0 0 auto}
header.top .titolo{font-family:"Lexend",sans-serif;font-weight:700;font-size:19px;color:#fff}
header.top .sotto{font-size:14px;opacity:.85;display:block;font-weight:400}
.schermata{padding:28px 0 64px}
.card{
  background:var(--carta);border:1px solid var(--bordo);border-radius:var(--raggio);
  padding:22px 24px;box-shadow:var(--ombra);margin-bottom:20px
}
.lead{font-size:19px;color:var(--testo-tenue)}
.btn{
  font-family:"Lexend",sans-serif;font-weight:500;font-size:17px;
  border:0;border-radius:10px;padding:12px 22px;cursor:pointer;
  background:var(--blu);color:#fff
}
.btn:hover{background:var(--blu-chiaro)}
.btn.secondario{background:var(--blu-tenue);color:var(--blu)}
/* dopo .secondario, altrimenti a parità di specificità il disabled non si vede */
.btn:disabled,.btn.secondario:disabled{background:#b9c4d8;color:#fff;cursor:not-allowed}

/* ===== PLAYER ===== */
.player{position:relative;width:100%;max-width:860px;margin:0 auto;
  padding-bottom:48.4%;border-radius:var(--raggio);overflow:hidden;background:#000}
.player iframe{position:absolute;inset:0;width:100%;height:100%;border:0;
  pointer-events:none}
.player .poster{position:absolute;inset:0;background-size:cover;background-position:center;
  cursor:pointer}
.player .poster::after{content:"";position:absolute;inset:0;background:rgba(18,62,144,.35)}
.player .poster .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:74px;height:74px;z-index:2}
.player .v-end{position:absolute;inset:0;background:rgba(18,62,144,.96);color:#fff;
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.player .v-end.on{display:flex}
.comandi{display:flex;align-items:center;gap:12px;max-width:860px;margin:12px auto 0}
.comandi .barra{flex:1 1 auto;height:8px;background:var(--bordo);border-radius:99px;
  cursor:pointer;position:relative}
.comandi .barra .avanz{position:absolute;left:0;top:0;bottom:0;background:var(--blu);
  border-radius:99px;width:0}
.comandi .tempo{font-variant-numeric:tabular-nums;font-size:15px;color:var(--testo-tenue)}
.comandi button{background:var(--blu-tenue);color:var(--blu);border:0;border-radius:8px;
  width:42px;height:42px;cursor:pointer}

/* ===== IDENTIFICAZIONE ===== */
.campi{display:flex;flex-wrap:wrap;gap:16px;margin:18px 0}
.campi label{display:flex;flex-direction:column;gap:6px;font-weight:700;color:var(--blu);
  flex:1 1 220px}
.campi input,.campi select{font-family:inherit;font-size:18px;font-weight:400;color:var(--testo);
  padding:10px 12px;border:1px solid var(--bordo);border-radius:10px;background:#fff}
.campi input:focus,.campi select:focus{outline:2px solid var(--blu-chiaro);outline-offset:1px}

/* ===== CONSEGNA ===== */
.avviso{background:var(--blu-tenue);border-left:4px solid var(--blu);
  border-radius:0 10px 10px 0;padding:14px 18px;margin:18px 0}
/* variante di richiamo: ambra, mai rosso, anche quando segnala qualcosa di mancante */
.avviso-ambra{background:#fdf6e3;border-left-color:var(--ambra)}
.mancanti{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.mancanti .q{width:38px;height:38px;border-radius:8px;border:1px solid var(--ambra-chiara);
  background:#fff;color:var(--ambra);font-family:"Lexend",sans-serif;
  font-size:14px;font-weight:700;cursor:pointer}
.mancanti .q:hover{background:var(--ambra);color:#fff}

/* ===== MAPPA ===== */
.mappa{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0}
.mappa .q{width:38px;height:38px;border-radius:8px;border:1px solid var(--bordo);
  background:#fff;color:var(--testo-tenue);font-family:"Lexend",sans-serif;
  font-size:14px;cursor:pointer}
.mappa .q.fatta{background:var(--blu-tenue);border-color:var(--blu-chiaro);color:var(--blu);
  font-weight:700}
.mappa .q.qui{outline:3px solid var(--blu);outline-offset:1px}
.navprova{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.navprova .btn:last-child{margin-left:auto}

/* ===== SPLIT ===== */
.split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:24px;
  align-items:start}
@media (max-width:900px){ .split{grid-template-columns:1fr} }
.quesito .tag{display:inline-block;background:var(--blu-tenue);color:var(--blu);
  font-family:"Lexend",sans-serif;font-size:13px;font-weight:500;
  padding:4px 10px;border-radius:99px;margin-bottom:10px}
.quesito .domanda{font-size:20px;font-weight:700;margin:6px 0 4px}
.quesito .inquadramento{background:#fbfcfe;border:1px solid var(--bordo);
  border-radius:10px;padding:12px 16px;margin:12px 0;font-size:17px;color:var(--testo)}
.opzioni{list-style:none;padding:0;margin:16px 0 0}
.opzioni li{margin-bottom:10px}
.opzioni button{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
  font-family:inherit;font-size:18px;color:var(--testo);background:#fff;
  border:1px solid var(--bordo);border-radius:10px;padding:12px 16px;cursor:pointer}
.opzioni button:hover{border-color:var(--blu-chiaro);background:#fbfcff}
.opzioni button.scelta{border-color:var(--blu);background:var(--blu-tenue);
  box-shadow:inset 0 0 0 1px var(--blu)}
.opzioni .lettera{font-family:"Lexend",sans-serif;font-weight:700;color:var(--blu);
  flex:0 0 auto;width:22px}
.stimolo{background:#fff;border:1px solid var(--bordo);border-radius:var(--raggio);
  padding:18px;box-shadow:var(--ombra);position:sticky;top:18px}
.stimolo h3{font-size:17px;margin-bottom:12px}
.stimolo svg{width:100%;height:auto;display:block}

/* ===== MOCKUP ===== */
.mk{border:1px solid var(--bordo);border-radius:12px;overflow:hidden;background:#fff;
  font-size:15px}
.mk .barra-fin{display:flex;align-items:center;gap:6px;padding:8px 10px;
  background:#f1f4f9;border-bottom:1px solid var(--bordo)}
.mk .pallino{width:10px;height:10px;border-radius:50%;background:#c9d3e4}
.mk .corpo{padding:14px}
.mk .riga{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:11px 12px;border-bottom:1px solid var(--bordo)}
.mk .riga:last-child{border-bottom:0}
.mk .chat{display:flex;flex-direction:column;gap:8px;padding:12px}
.mk .bolla{max-width:78%;padding:9px 13px;border-radius:14px;background:#eef1f6}
.mk .bolla.mia{align-self:flex-end;background:var(--blu-tenue)}
.hotspot{position:relative;display:block;width:100%;text-align:left;
  background:transparent;border:2px dashed transparent;border-radius:8px;
  cursor:pointer;font:inherit;color:inherit;padding:0;min-height:44px}
.hotspot:hover{border-color:var(--blu-chiaro);background:rgba(31,95,192,.05)}
.hotspot.scelta{border-color:var(--blu);border-style:solid;background:var(--blu-tenue)}
.hotspot .segna{position:absolute;top:6px;right:8px;font-family:"Lexend",sans-serif;
  font-size:12px;font-weight:700;color:var(--blu);opacity:0}
.hotspot.scelta .segna{opacity:1}

/* Gli SVG dentro un mockup sono icone con dimensioni proprie, non lo stimolo a tutta
   colonna: senza questa regola erediterebbero .stimolo svg{width:100%} e diventerebbero
   enormi. Più specifica di quella, quindi vince senza toccare il motore. */
.stimolo .mk svg{width:auto;height:auto;display:inline-block;flex:0 0 auto}

/* etichetta di finestra accanto ai pallini (nome dell'app o indirizzo) */
.mk .barra-fin .etichetta{font-size:13px;color:var(--testo-tenue);margin-left:6px}
.mk .barra-fin .pill{flex:1 1 auto;height:20px;border-radius:99px;background:#fff;
  border:1px solid var(--bordo);display:flex;align-items:center;padding:0 10px;
  font-size:12px;color:var(--testo-tenue)}

/* item 2 — griglia di app su schermo iPad */
.mk .app-griglia{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.mk .app{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 6px}
.mk .app .quadro{width:56px;height:56px;border-radius:14px;background:var(--blu-tenue);
  border:1px solid var(--bordo);display:flex;align-items:center;justify-content:center}
.mk .app .nome{font-family:"Lexend",sans-serif;font-size:13px;color:var(--testo)}
.mk .app .nota{font-size:12px;color:var(--testo-tenue);text-align:center;line-height:1.3}

/* item 3 — campo di ricerca e stato vuoto */
.mk .campo{display:flex;align-items:center;gap:9px;border:1px solid var(--bordo);
  border-radius:10px;padding:10px 12px;background:#fff}
.mk .campo .testo{color:var(--testo-tenue);font-size:15px}
.mk .campo .testo.scritto{color:var(--testo)}
.mk .cursore{display:inline-block;width:2px;height:17px;background:var(--blu);
  vertical-align:-3px}
.mk .vuoto{color:var(--testo-tenue);font-size:14px;text-align:center;padding:20px 8px}
.mk .nota-compito{background:var(--blu-tenue);border-radius:10px;padding:10px 12px;
  font-size:14px;margin-top:12px}
.mk .nota-compito .capo{display:block;font-family:"Lexend",sans-serif;font-size:12px;
  font-weight:700;color:var(--blu);margin-bottom:3px}

/* item 5 — articolo con firma dell'autore */
.mk .titolo-art{font-family:"Lexend",sans-serif;font-weight:700;font-size:17px;
  color:var(--testo);margin:0 0 6px;line-height:1.3}
.mk .firma{font-size:14px;color:var(--testo-tenue);margin-bottom:14px}
.mk .barretta{height:8px;border-radius:4px;background:var(--bordo);margin:10px 0}
.mk .metriche{font-size:13px;color:var(--testo-tenue);margin-top:14px;padding-top:10px;
  border-top:1px solid var(--bordo)}
.mk .profilo{margin-top:12px;border:1px solid var(--bordo);border-left:4px solid var(--ambra);
  border-radius:0 10px 10px 0;padding:10px 12px;font-size:14px;line-height:1.4}

/* item 8 — albero di cartelle dell'app File */
.mk .albero .voce{display:flex;align-items:center;gap:10px;padding:10px 12px}
.mk .albero .liv1{padding-left:30px}
.mk .albero .liv2{padding-left:48px}
.mk .albero .liv3{padding-left:66px}
.mk .albero .contenitore{color:var(--testo-tenue)}
.mk .albero .voce svg{flex:0 0 auto}
.mk .albero .glossa{font-size:12px;color:var(--testo-tenue);margin-left:auto;
  text-align:right;max-width:52%;line-height:1.25}
/* lo spazio a destra è riservato sempre, così il badge "scelta" non ci finisce sopra
   e la comparsa della scelta non fa saltare il testo */
.mk .albero .hotspot .glossa{margin-right:52px}

/* ---------- AREA 2 ---------- */

/* glossa a destra, comune ai mockup dell'area 2: compare solo in modalità esplicativa.
   Come nell'albero dell'item 8, lo spazio per il badge "scelta" è riservato sempre. */
.mk .glossa-dx{font-size:12px;color:var(--testo-tenue);margin-left:auto;text-align:right;
  max-width:46%;line-height:1.25}
.mk .hotspot .glossa-dx{margin-right:52px}

/* item 10 — menu delle modalità di un documento condiviso */
.mk .menu{border:1px solid var(--bordo);border-radius:10px;margin:12px 0 0;overflow:hidden}
.mk .menu .voce-menu{display:flex;align-items:center;gap:10px;padding:12px;min-height:44px}
.mk .menu > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .menu > .hotspot:last-child{border-bottom:0}
.mk .menu .nome-modo{font-family:"Lexend",sans-serif;font-size:14px;color:var(--testo)}
.mk .capo-menu{font-size:12px;color:var(--testo-tenue);text-transform:none}

/* item 11 — quattro canali di comunicazione a confronto */
.mk .canale{display:flex;align-items:center;gap:11px;padding:11px 12px;min-height:52px}
.mk > .corpo > .hotspot .canale{border-bottom:1px solid var(--bordo)}
.mk > .corpo > .hotspot:last-child .canale{border-bottom:0}
.mk .canale .testa{display:flex;flex-direction:column;gap:2px}
.mk .canale .nome-canale{font-family:"Lexend",sans-serif;font-size:14px;color:var(--testo)}
.mk .canale .dest{font-size:12px;color:var(--testo-tenue);line-height:1.25}

/* item 13 — quattro bozze dello stesso messaggio */
.mk .bozza{border:1px solid var(--bordo);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.mk .bozza:last-child{margin-bottom:0}
.mk .bozza .capo-bozza{display:block;font-family:"Lexend",sans-serif;font-size:12px;
  font-weight:700;color:var(--blu);margin-bottom:4px}
.mk .bozza .testo-bozza{margin:0;font-size:14px;line-height:1.45}
.mk .bozza .glossa-sotto{display:block;font-size:12px;color:var(--testo-tenue);
  line-height:1.3;margin-top:6px;padding-top:6px;border-top:1px solid var(--bordo)}

/* item 14 — contenuto altrui da ricondividere */
.mk .fonte{font-size:13px;color:var(--testo-tenue);margin:8px 0 0}
.mk .campo-post{border:1px dashed var(--bordo);border-radius:10px;padding:11px 12px;
  margin-top:12px;color:var(--testo-tenue);font-size:13px}

/* item 16 — pannello delle autorizzazioni del calendario */
.mk .permesso{display:flex;align-items:center;gap:10px;padding:12px;min-height:44px}
.mk .permesso .nome-permesso{font-family:"Lexend",sans-serif;font-size:14px;color:var(--testo)}
.mk .elenco-permessi > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .elenco-permessi > .hotspot:last-child{border-bottom:0}
.mk .intestazione-pannello{padding:12px 12px 0;font-size:13px;color:var(--testo-tenue);
  line-height:1.35}

/* ---------- AREA 3 ---------- */

/* item 18 — foglio di esportazione: un formato per riga */
.mk .formato{display:flex;align-items:center;gap:10px;padding:12px;min-height:44px}
.mk .formato .testa-formato{display:flex;flex-direction:column;gap:1px}
.mk .formato .nome-formato{font-family:"Lexend",sans-serif;font-size:14px;color:var(--testo)}
.mk .formato .estensione{font-size:12px;color:var(--testo-tenue)}
.mk .elenco-formati > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .elenco-formati > .hotspot:last-child{border-bottom:0}

/* item 21 — scheda di un titolo e avviso di non disponibilità */
.mk .scheda-titolo{display:flex;align-items:center;gap:12px}
.mk .scheda-titolo .dati{display:flex;flex-direction:column;gap:3px}
.mk .scheda-titolo .nome-titolo{font-family:"Lexend",sans-serif;font-size:15px;
  font-weight:700;color:var(--testo);line-height:1.25}
.mk .scheda-titolo .durata{font-size:12px;color:var(--testo-tenue)}
.mk .avviso-paese{display:flex;align-items:center;gap:10px;margin-top:12px;padding:11px 12px;
  border:1px solid var(--bordo);border-left:4px solid var(--ambra);
  border-radius:0 10px 10px 0;background:#fdfaf3;font-size:14px;line-height:1.35}
.mk .fila-poster{display:flex;gap:10px;margin-top:8px}
.mk .fila-poster .voce-poster{display:flex;flex-direction:column;align-items:center;gap:5px;
  flex:1 1 0;font-size:11px;color:var(--testo-tenue);text-align:center;line-height:1.2}

/* item 22 — la stessa pagina in due versioni affiancate.
   Le due colonne hanno lo stesso corpo di carattere e la stessa struttura visibile:
   l'unica differenza che si vede è quanto il testo si stacca dal fondo. Che i titoli
   dell'una siano marcati come titoli e quelli dell'altra no non è visibile in prova —
   compare solo nel pannello esplicativo, perché è esattamente la risposta. */
.mk .due-versioni{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mk .versione .capo-versione{display:block;font-family:"Lexend",sans-serif;font-size:12px;
  font-weight:700;color:var(--blu);margin-bottom:6px}
.mk .pagina-finta{border:1px solid var(--bordo);border-radius:10px;padding:10px;background:#fff}
.mk .pagina-finta .tit-pagina{font-family:"Lexend",sans-serif;font-size:14px;font-weight:700;
  margin:0 0 4px;line-height:1.25}
.mk .pagina-finta .testo-pagina{font-size:12px;margin:0 0 10px;line-height:1.35}
.mk .pagina-finta > *:last-child{margin-bottom:0}
.mk .pagina-finta.pallida .tit-pagina,.mk .pagina-finta.pallida .testo-pagina{color:#c6ccd6}
.mk .pagina-finta.nitida .tit-pagina,.mk .pagina-finta.nitida .testo-pagina{color:var(--testo)}
.mk .esito-lettura{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.mk .esito-lettura .riquadro{border:1px solid var(--bordo);border-left:4px solid var(--ambra);
  border-radius:0 10px 10px 0;padding:9px 11px;font-size:12px;line-height:1.3}
.mk .esito-lettura .riquadro strong{display:block;font-family:"Lexend",sans-serif;
  font-size:11px;color:var(--blu);margin-bottom:2px}

/* item 24 — le tre fonti raccolte sullo stesso argomento */
.mk .fonte-scheda{border:1px solid var(--bordo);border-radius:10px;padding:10px 12px;
  margin-bottom:10px}
.mk .fonte-scheda:last-child{margin-bottom:0}
.mk .fonte-scheda .capo-fonte{display:block;font-family:"Lexend",sans-serif;font-size:11px;
  font-weight:700;color:var(--blu);margin-bottom:3px}
.mk .fonte-scheda .titolo-fonte{font-family:"Lexend",sans-serif;font-size:14px;font-weight:700;
  margin:0 0 5px;line-height:1.3}
.mk .fonte-scheda .testo-fonte{margin:0;font-size:13px;line-height:1.4}
.mk .fonte-scheda .prov{display:block;font-size:11px;color:var(--testo-tenue);margin-top:6px}

/* ---------- AREA 4 ---------- */
/* In tutti i mockup di quest'area lo spazio a destra dentro un hotspot è riservato
   sempre (56px): il badge "scelta" compare in alto a destra e senza quel margine
   finirebbe sopra il testo — errore già visto e corretto nelle aree precedenti. */

/* item 26 — richiesta di accesso alla posizione */
.mk .testa-permesso{padding:16px 14px 12px;text-align:center}
.mk .testa-permesso .dom{font-family:"Lexend",sans-serif;font-size:15px;font-weight:700;
  color:var(--testo);margin:10px 0 5px;line-height:1.3}
.mk .testa-permesso .spieg{font-size:13px;color:var(--testo-tenue);line-height:1.35;margin:0}
.mk .scelte-perm{border-top:1px solid var(--bordo)}
.mk .scelte-perm > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .scelte-perm > .hotspot:last-child{border-bottom:0}
.mk .voce-perm{display:flex;align-items:center;gap:10px;padding:13px 12px;min-height:46px}
.mk .voce-perm .nome-perm{font-family:"Lexend",sans-serif;font-size:14px;color:var(--blu)}
.mk .scelte-perm .hotspot .voce-perm{padding-right:56px}

/* item 27 — messaggio sospetto: le quattro parti sono tutte toccabili */
.mk .elenco-msg > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .elenco-msg > .hotspot:last-child{border-bottom:0}
.mk .msg-riga{display:flex;flex-direction:column;gap:2px;padding:11px 12px;min-height:46px}
.mk .msg-riga .capo-msg{font-family:"Lexend",sans-serif;font-size:11px;font-weight:700;
  color:var(--testo-tenue)}
.mk .msg-riga .val-msg{font-size:14px;color:var(--testo);line-height:1.35;
  overflow-wrap:anywhere}
.mk .elenco-msg .hotspot .msg-riga{padding-right:56px}
.mk .finto-link{color:var(--blu-chiaro);text-decoration:underline;overflow-wrap:anywhere}
/* le quattro righe del messaggio hanno tutte una riga di dettaglio, con lo stesso peso
   visivo: nessun contenitore, nessun colore. Evidenziarne una sola faceva sì che chi
   scorreva senza leggere toccasse quella, senza sapere che cos'è un dominio. */
.mk .dettaglio-msg{display:block;margin-top:6px;font-size:12px;color:var(--testo-tenue);
  line-height:1.35;overflow-wrap:anywhere}
.mk .nota-gesto{font-size:11px;color:var(--testo-tenue);padding:10px 12px 0;line-height:1.35;
  margin:0}

/* item 29 — modulo con due caselle di consenso e le quattro combinazioni */
.mk .blocco-modulo{padding:12px}
.mk .consenso{display:flex;gap:9px;padding:10px 0;border-bottom:1px solid var(--bordo)}
.mk .consenso:last-child{border-bottom:0}
.mk .consenso svg{margin-top:1px}
.mk .consenso .testo-cons{font-size:13px;line-height:1.4;margin:0}
.mk .elenco-combi{border-top:1px solid var(--bordo)}
.mk .elenco-combi > .hotspot{border-bottom:1px solid var(--bordo)}
.mk .elenco-combi > .hotspot:last-child{border-bottom:0}
.mk .combi{display:flex;align-items:center;gap:11px;padding:11px 12px;min-height:46px}
.mk .combi .caselle{display:flex;gap:6px;flex:0 0 auto}
.mk .combi .et-combi{font-size:13px;color:var(--testo);line-height:1.3}
.mk .elenco-combi .hotspot .combi{padding-right:56px}

/* item 32 — quattro sequenze di attivazione a confronto */
.mk .elenco-seq{padding:12px}
.mk .elenco-seq > .hotspot{margin-bottom:10px}
.mk .elenco-seq > .hotspot:last-child{margin-bottom:0}
.mk .sequenza{border:1px solid var(--bordo);border-radius:10px;padding:9px 11px}
.mk .elenco-seq .hotspot .sequenza{padding-right:56px}
.mk .sequenza .capo-seq{display:block;font-family:"Lexend",sans-serif;font-size:11px;
  font-weight:700;color:var(--blu);margin-bottom:5px}
.mk .sequenza ol{margin:0;padding-left:19px;font-size:13px;line-height:1.4}
.mk .sequenza li{margin-bottom:3px}
.mk .sequenza li:last-child{margin-bottom:0}

/* aggiunte area 4 — dentro un hotspot flex serve una colonna interna, altrimenti nome
   e nota diventano due flex-item affiancati e la nota si schiaccia in una colonnina.
   La nota esplicativa sta sotto, a piena larghezza della voce. */
.mk .col-a4{display:flex;flex-direction:column;gap:3px;min-width:0}
.mk .nota-a4{display:block;font-size:12px;color:var(--testo-tenue);line-height:1.35;
  margin-top:6px;padding-top:6px;border-top:1px solid var(--bordo)}
.mk .invia-finto{display:inline-block;margin-top:12px;background:var(--blu);color:#fff;
  font-family:"Lexend",sans-serif;font-size:13px;border-radius:8px;padding:9px 15px}
/* le due caselle della combinazione restano accanto alla loro etichetta: con
   l'allineamento al centro, quando compare la nota esplicativa scivolavano in mezzo
   al blocco e non si capiva più a quale riga si riferissero */
.mk .combi .caselle{align-self:flex-start;margin-top:1px}
/* la sequenza è uno span (dentro un button si annidano solo span) ma contiene un <ol>:
   lasciata inline, la cornice si spezzava in frammenti a metà delle righe */
.mk .sequenza{display:block}

/* ===== RESTITUZIONE ===== */
/* i quattro livelli: verde solo per Avanzato, ambra per il più basso. Mai il rosso. */
.livello{display:inline-block;font-family:"Lexend",sans-serif;font-weight:700;
  padding:6px 16px;border-radius:99px;color:#fff}
.livello.av{background:var(--verde)}
.livello.in{background:var(--blu)}
.livello.ba{background:var(--blu-chiaro)}
.livello.pa{background:var(--ambra)}
.livello-grande{margin:18px 0;font-size:24px}
.livello-grande .livello{font-size:24px;padding:10px 26px}
.aree{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.area-box{border:1px solid var(--bordo);border-radius:12px;padding:16px}
.area-box h3{font-size:16px;margin-bottom:10px}
.dettaglio{font-size:15px;color:var(--testo-tenue);margin:10px 0 0}
.nota{font-size:16px;color:var(--testo-tenue);margin-top:18px}
.rev{border-top:1px solid var(--bordo);padding-top:22px;margin-top:22px}
/* .tag/.domanda/.inquadramento sono definiti sotto .quesito: nella revisione il
   contenitore è .rev, quindi le regole vanno ripetute qui o il blocco perde lo stile */
.rev .tag{display:inline-block;background:var(--blu-tenue);color:var(--blu);
  font-family:"Lexend",sans-serif;font-size:13px;font-weight:500;
  padding:4px 10px;border-radius:99px;margin-bottom:10px}
.rev .domanda{font-size:20px;font-weight:700;margin:6px 0 10px}
.rev .inquadramento{background:#fbfcfe;border:1px solid var(--bordo);
  border-radius:10px;padding:12px 14px;margin:8px 0;font-size:17px}
.tua{background:#fdf6e3;border-left:4px solid var(--ambra);border-radius:0 10px 10px 0;
  padding:12px 16px}
.tua .perche{color:var(--testo-tenue);font-size:17px}
.tua-vuota{font-style:italic}
.giusta{background:#eef7f1;border-left:4px solid var(--verde);border-radius:0 10px 10px 0;
  padding:12px 16px}
.spiega{font-size:17px}
.ricomincia{border-top:1px solid var(--bordo);margin-top:22px;padding-top:22px}
</style>

{

{
  id:3, area:1, dim:"1.1", oggetto:"Abilità", livello:"Base", origine:"G13 q2",
  inquadramento:null,
  consegna:"Per la ricerca di scienze devi capire perché in autunno le foglie degli alberi cambiano colore. Hai davanti la barra di ricerca vuota: quale formulazione ti porta più vicino a quello che cerchi?",

{

{
  id:9, area:2, dim:"2.3", oggetto:"Conoscenza", livello:"Base", origine:"G13 q7",

  corretta:1,
  misconcetti:[
    "Arriva al risultato saltando chi ha scritto: le frasi migliorano davvero, ma l'autore si ritrova il testo cambiato senza aver deciso nulla, e spesso senza nemmeno accorgersene.",
    null,
    "Si ferma a segnalare il problema: la nota a margine avverte che una frase non funziona, ma lascia all'autore anche il lavoro di trovare come riscriverla.",
    "Sceglie il livello più prudente: leggere e basta non toglie niente a nessuno, ma nemmeno restituisce il contributo che il compagno aveva chiesto."
  ],
  feedback:"La richiesta conteneva due cose insieme: intervenire sul testo, e lasciare all'autore l'ultima parola. La modalità di suggerimento è l'unica che le tiene entrambe — quello che scrivi resta visibile come proposta finché il compagno non decide. Modificare direttamente fa la prima cosa e non la seconda; commentare fa la seconda e non la prima; la sola lettura non ne fa nessuna. Su un documento condiviso vale la pena chiedersi ogni volta di chi è il testo, prima ancora di come si scrive."
},

{
  id:11, area:2, dim:"2.1", oggetto:"Abilità", livello:"Base", origine:"nuovo",
  inquadramento:null,
  consegna:"Sei a casa la sera. Il professore di tecnologia ha chiesto la foto del modulo firmato dai tuoi genitori e deve poterla ritrovare fra un mese, quando organizzerà l'uscita. Fra i quattro canali del riquadro, quale usi?",
  stimolo:{tipo:"mockup", render:"mkQuattroCanali", titolo:"I canali che hai a disposizione", hotspot:true},
  opzioni:[
    "La chat di classe, dove ci sono tutti e ventidue i compagni.",
    "La mail al professore, con la foto del modulo in allegato.",
    "AirDrop, che invia il file ai dispositivi vicini.",
    "La bacheca digitale della scuola, visibile a tutti."
  ],
  corretta:1,
  misconcetti:[
    "Manda a ventidue persone quello che riguarda una sola: nella chat di classe il professore spesso non c'è nemmeno, e un modulo con i dati della tua famiglia finisce comunque sotto gli occhi di tutti.",
    null,
    "Sceglie il canale più rapido senza guardare dove si trova: AirDrop raggiunge solo i dispositivi a pochi metri, e alla sera da casa non c'è nessuno da raggiungere.",
    "Confonde il pubblicare con il consegnare: mettere un documento personale dove lo vede tutta la scuola non lo fa arrivare a chi lo aspetta, e nel frattempo lo mostra a chi non c'entra."
  ],
  feedback:"Scegliere un canale vuol dire tenere insieme tre cose: chi deve ricevere, quanto la situazione è formale, e se serve che il messaggio resti. Qui il destinatario è una persona sola, il rapporto è scolastico e il file dovrà essere ritrovabile fra un mese: la mail soddisfa tutte e tre. Gli altri tre canali sono strumenti utili, ma ciascuno fallisce su almeno una: la chat sbaglia i destinatari, AirDrop non arriva da lontano, la bacheca rende pubblico un documento personale."
},

{
  id:12, area:2, dim:"2.6", oggetto:"Conoscenza", livello:"Intermedio", origine:"G13 q8",
  inquadramento:null,
  consegna:"Nel riquadro accanto cose molto diverse fatte online in giorni diversi convergono tutte verso lo stesso punto. Che cos'è l'identità digitale di una persona?",
  stimolo:{tipo:"svg", render:"svgTracceIdentita", titolo:"Che cosa converge"},
  opzioni:[
    "L'insieme delle tracce che una persona lascia online e che, messe insieme, dicono chi è.",
    "L'insieme dei nomi utente e delle password con cui accede ai propri account online.",
    "Il profilo pubblico che ha su un social network, con la foto e la descrizione che ha scelto.",
    "La versione elettronica del documento d'identità, con i dati anagrafici registrati."
  ],
  corretta:0,
  misconcetti:[
    null,
    "Scambia la chiave con la casa: le credenziali servono ad aprire gli account, non sono le informazioni su di te che restano in giro dopo che sei entrato.",
    "Si ferma al pezzo scelto e visibile: il profilo social è una parte sola, ed è per giunta l'unica che decidi tu; le altre tracce si accumulano senza che nessuno le componga.",
    "Confonde l'identità digitale con il documento: la carta d'identità dice le tue generalità, non ciò che fai, cerchi e compri in rete."
  ],
  feedback:"Nel riquadro non c'era una cosa sola: c'erano un commento, una foto, un acquisto, una posizione, una ricerca — ognuna innocua per conto suo. Quello che le rende un'identità digitale è che convergono: messe insieme compongono un ritratto abbastanza preciso da riconoscere una persona e prevedere che cosa farà. Le credenziali sono solo le chiavi, il profilo social è la parte che hai scelto tu, il documento riguarda un altro piano. L'identità digitale è tutto il resto, e si forma anche quando non stai facendo niente di particolare."
},

{
  id:13, area:2, dim:"2.5", oggetto:"Abilità", livello:"Intermedio", origine:"G13 q11",
  inquadramento:null,
  consegna:"Venerdì eri assente e non sai che cosa è stato assegnato per il lavoro di storia. Nel riquadro ci sono quattro bozze dello stesso messaggio al professore: quale mandi?",
  stimolo:{tipo:"mockup", render:"mkBozzeMessaggio", titolo:"Quattro bozze dello stesso messaggio"},
  opzioni:[
    "La bozza 1, quella che comincia con «Ciao prof! venerdì non c'ero e non so…»",
    "La bozza 2, quella che comincia con «Buongiorno professore, avrei una domanda…»",
    "La bozza 3, quella che comincia con «Buongiorno professore, sono Giulia Bertoli della 3ªB…»",
    "La bozza 4, quella che comincia con «Egregio e stimatissimo Professore, mi permetto…»"
  ],
  corretta:2,
  misconcetti:[
    "Scrive al professore come scriverebbe a un compagno: il tono confidenziale non è maleducazione, ma cancella la distanza che un rapporto scolastico ha, e «la roba» lascia comunque il destinatario senza sapere che cosa serve.",
    "Cura la forma e dimentica il contenuto: il messaggio è gentile e corretto, ma chi lo riceve non sa che cosa gli si stia chiedendo e deve scrivere a sua volta per farselo dire.",
    null,
    "Scambia la formalità con l'efficacia: le formule cerimoniose si accumulano fino a coprire la richiesta, e alla fine il professore deve rileggere due volte per capire che cosa vuoi."
  ],
  feedback:"Nessuna delle quattro bozze ha errori di ortografia: quello che le distingue è la scelta comunicativa. Un messaggio a un professore funziona quando fa tre cose in poche righe — dice chi scrive, dice qual è la situazione, dice che cosa si chiede. La bozza scelta non è né la più lunga né la più formale: il registro cerimoniale non aggiunge rispetto, aggiunge parole; il tono da chat non è irrispettoso, è solo fuori posto; e la bozza gentile ma vaga costringe chi legge a un secondo scambio per capire."
},

{
  id:14, area:2, dim:"2.2", oggetto:"Abilità", livello:"Intermedio", origine:"nuovo",
  inquadramento:null,
  consegna:"Hai trovato il grafico del riquadro su un sito di divulgazione e vuoi ricondividerlo nel gruppo della classe. In che modo lo pubblichi?",
  stimolo:{tipo:"mockup", render:"mkAttribuzione", titolo:"Il contenuto che vuoi ricondividere"},
  opzioni:[
    "Pubblicando l'immagine così com'è, senza scrivere niente accanto ad essa.",
    "Pubblicando l'immagine e scrivendo sotto soltanto «trovato su internet».",
    "Pubblicando l'immagine con il nome dell'autore, il sito e il link alla pagina.",
    "Rifacendo il grafico con gli stessi dati e altri colori, e pubblicandolo come lavoro tuo."
  ],
  corretta:2,
  misconcetti:[
    "Tratta ciò che è online come se non fosse di nessuno: un'immagine resta di chi l'ha realizzata anche quando bastano due tocchi per salvarla.",
    "Crede che basti ammettere di non averlo fatto tu: «trovato su internet» dichiara di non esserne l'autore, ma non permette a nessuno di risalire alla fonte e di controllarla.",
    null,
    "Confonde il rifare con il creare: i dati e l'idea del grafico restano di un altro, e cambiare i colori non aggiunge lavoro tuo, nasconde soltanto da dove viene."
  ],
  feedback:"Citare non è una formalità da compilare: serve a chi legge, perché gli permette di andare a vedere da dove viene un dato e di giudicarlo da sé. Per questo «trovato su internet» non basta — è vero, ma non porta da nessuna parte. Nome dell'autore, sito e link sono le tre informazioni che rendono la fonte verificabile. Ripubblicare senza dire niente e rifare il grafico spacciandolo per proprio sono due gradi dello stesso problema: il secondo aggiunge anche un lavoro fatto apposta per coprire l'origine."
},

{
  id:15, area:2, dim:"2.6", oggetto:"Conoscenza", livello:"Avanzato", origine:"G13 q9",
  inquadramento:null,
  consegna:"Apri un sito per una ricerca e compare il riquadro accanto. Vuoi leggere la pagina lasciando che si raccolga su di te il meno possibile: quale scelta fai e per quale motivo?",
  stimolo:{tipo:"svg", render:"svgBannerCookie", titolo:"Il riquadro che compare"},
  opzioni:[
    "Accetto tutti i cookie: senza di essi il sito non funziona e la pagina non si vede.",
    "Rifiuto i cookie non essenziali: la pagina si legge lo stesso e nessuno mi segue altrove.",
    "Chiudo il riquadro senza scegliere: se non scelgo, nessun cookie viene installato.",
    "Accetto tutto e poi cancello la cronologia: così sparisce anche quello che hanno raccolto."
  ],
  corretta:1,
  misconcetti:[
    "Mette insieme due tipi di cookie che il riquadro chiede proprio di distinguere: quelli tecnici servono davvero a far funzionare la pagina, quelli di profilazione servono a chi vende pubblicità.",
    null,
    "Immagina che non scegliere equivalga a rifiutare: chiudere il riquadro lascia la questione aperta, e su molti siti la navigazione prosegue con i cookie già attivi.",
    "Scambia le proprie tracce sul dispositivo con i dati già finiti altrove: la cronologia è tua e la cancelli quando vuoi, ma quello che è stato raccolto è ormai sui server di chi l'ha raccolto."
  ],
  feedback:"I cookie non sono tutti la stessa cosa, ed è per questo che il riquadro offre più di un pulsante. Una parte serve al sito per funzionare — ricordare che hai fatto l'accesso, tenere il carrello pieno — e senza quelli la pagina davvero si rompe. Un'altra parte serve a costruire un profilo dei tuoi interessi e a ritrovarti sugli altri siti che visiterai. Rifiutare i non essenziali lascia i primi e toglie i secondi: la pagina si legge esattamente come prima. Chiudere senza scegliere non è una scelta, e cancellare la cronologia dopo agisce solo sul tuo dispositivo."
},

{
  id:16, area:2, dim:"2.4", oggetto:"Abilità", livello:"Avanzato", origine:"G13 q12",
  inquadramento:null,
  consegna:"Hai creato in Calendario il calendario \"Progetto di tecnologia 3ªB\" con le riunioni e le consegne. I quattro compagni del gruppo devono poter vedere tutte le date e i luoghi, ma le date le fissi tu. Quale autorizzazione dai loro?",
  stimolo:{tipo:"mockup", render:"mkPermessiCalendario", titolo:"Le autorizzazioni del calendario", hotspot:true},
  opzioni:[
    "Vedere solo libero od occupato — i compagni vedono che quel giorno c'è qualcosa, ma non che cosa.",
    "Vedere tutti i dettagli — i compagni leggono titolo, ora e luogo di ogni evento del calendario.",
    "Modificare gli eventi — i compagni possono spostare, cambiare e cancellare le date fissate.",
    "Modificare e gestire la condivisione — i compagni possono anche far entrare altre persone nel calendario."
  ],
  corretta:1,
  misconcetti:[
    "Concede meno di quanto lo scopo richieda: i compagni sanno che quel giorno sei occupato, ma non quando è la riunione né dove, e devono chiedertelo ogni volta.",
    null,
    "Dà più accesso del necessario pur di non fare da tramite: chi può modificare può anche spostare o cancellare una data per sbaglio, e nessuno se ne accorge finché non arriva il giorno.",
    "Sale al livello più alto perché sembra il più generoso: gestire la condivisione significa che chiunque del gruppo può aggiungere altre persone, e tu non sai più chi vede il calendario."
  ],
  feedback:"Le quattro voci non sono quattro opzioni alla pari: sono una scala, dal vedere pochissimo al poter decidere chi altro entra. La regola utile è concedere il minimo che basta allo scopo — non per diffidenza verso i compagni, ma perché ogni permesso in più è una cosa che può andare storta senza che nessuno l'abbia voluta. Qui lo scopo era che tutti vedessero le date: il livello che mostra i dettagli senza permettere modifiche lo raggiunge per intero, e si ferma lì. Se poi servirà che qualcun altro sposti le riunioni, il permesso si alza in qualsiasi momento."
},

/* ---------- AREA 3 — Creazione di contenuti digitali ---------- */

{
  id:17, area:3, dim:"3.1", oggetto:"Conoscenza", livello:"Base", origine:"G13 q13",
  inquadramento:"Ci sono oggetti che non sembrano computer ma lo sono: un termostato che si regola dal telefono, un orologio che conta i passi, un contatore che avvisa quando l'acqua sta finendo. L'insieme di questi oggetti si chiama <strong>Internet delle Cose</strong> (in inglese <em>Internet of Things</em>, IoT).",
  consegna:"Guarda il riquadro accanto e chiediti che cosa hanno in comune quegli oggetti, così diversi fra loro. Quale di queste descrizioni corrisponde all'Internet delle Cose?",
  /* il titolo non nomina né «rete» né «dati»: sono due delle tre parole della corretta */
  stimolo:{tipo:"svg", render:"svgOggettiConnessi", titolo:"Quattro cose molto diverse fra loro"},
  opzioni:[
    "Lo spazio in rete dove si archiviano file e fotografie, per ritrovarli da qualunque dispositivo.",
    "Oggetti di uso quotidiano che contengono un sensore, si collegano a una rete e si scambiano dati.",
    "Il modo di guardare film e ascoltare musica in rete senza doverli scaricare sul dispositivo.",
    "I programmi capaci di rispondere a domande e di generare testi e immagini imitando il ragionamento umano."
  ],
  corretta:1,
  misconcetti:[
    "Confonde gli oggetti connessi con il posto dove si tengono i file: l'archiviazione in rete conserva quello che ci metti tu, mentre qui sono gli oggetti stessi a produrre e mandare dati senza che nessuno li carichi.",
    null,
    "Scambia il trasferimento di contenuti con gli oggetti che li producono: nello streaming la rete porta a te un video già fatto, qui la rete collega cose che misurano e segnalano.",
    "Attribuisce all'Internet delle Cose la capacità di ragionare: un sensore che rileva la temperatura non elabora né inventa niente, si limita a misurare e a trasmettere."
  ],
  feedback:"Nel riquadro gli oggetti sono tutti diversi — un orologio, un termostato, una lampada, un contatore dell'acqua — e tutti collegati allo stesso punto. È questo che li rende Internet delle Cose: sono cose ordinarie che hanno dentro un sensore e una connessione, e che mandano dati senza che nessuno stia lì a farlo. L'archiviazione in rete, lo streaming e l'intelligenza artificiale sono tre cose reali e diverse fra loro, ma nessuna delle tre riguarda oggetti fisici che misurano il mondo e lo raccontano a una rete."
},

{
  id:18, area:3, dim:"3.1", oggetto:"Abilità", livello:"Base", origine:"G13 q16",
  inquadramento:null,
  consegna:"Hai finito la relazione di geografia e la devi consegnare alla professoressa. Deve vedersi identica su qualunque dispositivo la apra, e nessuno deve poterne cambiare il testo. Nel foglio di esportazione, quale formato scegli?",
  stimolo:{tipo:"mockup", render:"mkFormatiEsportazione", titolo:"Il foglio di esportazione", hotspot:true},
  opzioni:[
    "Pages — il formato in cui il documento è stato scritto.",
    "PDF — il formato che fissa l'impaginazione così com'è.",
    "Word — il formato di un altro programma di scrittura.",
    "Testo semplice — soltanto i caratteri, senza impaginazione."
  ],
  corretta:1,
  misconcetti:[
    "Consegna nel formato in cui ha lavorato, come se fosse la scelta neutra: il documento resta però modificabile da chi lo riceve, e si apre solo dove c'è quella stessa app.",
    null,
    "Cerca la compatibilità pensando al programma più diffuso: il file si apre quasi ovunque, ma resta un documento di scrittura, cioè modificabile, e l'impaginazione può spostarsi da un dispositivo all'altro.",
    "Scambia \"leggero\" con \"universale\": il testo semplice si apre davvero dappertutto, ma proprio perché butta via impaginazione, immagini e tabelle, e della relazione resta solo una colonna di parole."
  ],
  feedback:"La scelta del formato si fa a partire da che cosa deve succedere al file dopo. Qui le condizioni erano due: che si veda uguale ovunque e che non si possa cambiare. Il PDF è nato esattamente per questo: porta con sé i caratteri e l'impaginazione, e chi lo apre lo legge, non lo riscrive. Gli altri tre formati servono tutti a qualcosa, ma sono formati di lavoro: restano aperti alle modifiche, e due dei tre non garantiscono nemmeno che la pagina resti come l'hai lasciata."
},

{
  id:19, area:3, dim:"3.4", oggetto:"Abilità", livello:"Base", origine:"nuovo",
  inquadramento:null,
  consegna:"Il drone del riquadro parte dalla casella di partenza e deve arrivare alla piazzola di atterraggio. Si sposta una casella alla volta e non può attraversare le caselle occupate dagli ostacoli. Quale sequenza di istruzioni lo porta a destinazione?",
  stimolo:{tipo:"svg", render:"svgGrigliaDrone", titolo:"La griglia di volo"},
  opzioni:[
    "Prima 4 passi a destra, poi 3 passi in alto.",
    "Prima 3 passi in alto, poi 4 passi a destra.",
    "Prima 1 passo in alto, poi 4 a destra, poi 2 in alto.",
    "Prima 1 passo in alto, poi 3 a destra, poi 2 in alto."
  ],
  corretta:2,
  misconcetti:[
    "Prende la strada più diretta contando solo le caselle che separano partenza e arrivo, senza guardare che cosa c'è in mezzo: sulla prima riga il drone si trova un ostacolo davanti e si ferma lì.",
    "Inverte l'ordine dei due tratti dando per scontato che sia indifferente: su una griglia libera lo sarebbe, ma con gli ostacoli l'ordine cambia tutto. Qui la salita fila liscia, poi il drone trova un ostacolo appena prova a spostarsi a destra.",
    null,
    "Sbaglia il conteggio di un passo solo sul tratto orizzontale: il percorso è libero per tutta la sua lunghezza, ma il drone si ferma una casella prima della piazzola."
  ],
  feedback:"Programmare vuol dire dire a una macchina che cosa fare in un ordine preciso, e la macchina fa esattamente quello — non quello che intendevi. Qui contano tre cose insieme: la direzione di ogni tratto, quanti passi dura, e in che ordine i tratti si susseguono. Cambiare l'ordine di due tratti che sembrano equivalenti manda il drone contro un ostacolo; sbagliare di uno il conteggio lo lascia a una casella dall'arrivo. Prima di lanciare una sequenza vale la pena percorrerla con il dito, casella per casella."
},

{
  id:20, area:3, dim:"3.1", oggetto:"Conoscenza", livello:"Intermedio", origine:"G13 q14",
  inquadramento:null,
  consegna:"Una tua compagna ipovedente legge le pagine con uno strumento che gliele dice ad alta voce. Nella pagina del riquadro c'è una fotografia. Che cosa deve aver preparato chi ha costruito la pagina, perché lei sappia che cosa quella fotografia mostra?",
  stimolo:{tipo:"svg", render:"svgTestoAlternativo", titolo:"Una pagina che viene letta ad alta voce"},
  opzioni:[
    "Una descrizione scritta dell'immagine, collegata a essa e destinata a chi non può vederla.",
    "La didascalia stampata sotto la fotografia, che lo strumento legge insieme al resto della pagina.",
    "Un nome del file che descriva il contenuto della fotografia invece di essere una sigla.",
    "La possibilità di ingrandire la fotografia toccandola, per guardarne meglio i particolari."
  ],
  corretta:0,
  misconcetti:[
    null,
    "Scambia ciò che è scritto vicino all'immagine con ciò che descrive l'immagine: la didascalia viene letta davvero, ma di solito aggiunge un contesto — dove, quando, chi — e non dice che cosa si vede.",
    "Affida a un dettaglio tecnico un compito che non gli appartiene: il nome del file serve a chi gestisce i file, non viene letto a chi ascolta la pagina, e comunque non ci sta una descrizione.",
    "Risolve il problema per chi vede poco dimenticando chi non vede affatto: ingrandire aiuta molte persone, ma davanti a un'immagine più grande chi ascolta la pagina resta esattamente al punto di prima."
  ],
  feedback:"Chi ascolta una pagina riceve solo quello che è scritto. Dove c'è un'immagine, se nessuno ha preparato una descrizione, resta un buco: lo strumento annuncia che lì c'è una fotografia e si ferma. Il testo alternativo è quella descrizione — non si vede sullo schermo, viaggia attaccata all'immagine ed esiste per essere letta ad alta voce. Didascalia, nome del file e ingrandimento sono tutte cose utili, ma nessuna delle tre fa arrivare il contenuto dell'immagine a chi non la può guardare. Scriverla richiede una riga, e va scritta da chi mette l'immagine nella pagina."
},

{
  id:21, area:3, dim:"3.3", oggetto:"Abilità", livello:"Intermedio", origine:"G13 q17",
  inquadramento:null,
  consegna:"Apri il catalogo per vedere un documentario e compare l'avviso del riquadro. Un tuo cugino che vive in Germania ti dice che in questo momento lo sta guardando, sullo stesso servizio. Qual è la spiegazione più probabile?",
  stimolo:{tipo:"mockup", render:"mkAvvisoNonDisponibile", titolo:"L'avviso che compare"},
  opzioni:[
    "La connessione a internet non è abbastanza veloce per riprodurre un contenuto così lungo.",
    "Chi lo ha prodotto ne ha venduto i diritti Paese per Paese, e in Italia non a questo servizio.",
    "L'abbonamento al servizio è scaduto e va rinnovato prima di poter riprendere a guardare.",
    "Il dispositivo che stai usando non è compatibile con il formato in cui è registrato il documentario."
  ],
  corretta:1,
  misconcetti:[
    "Attribuisce alla rete un blocco che riguarda il catalogo: se fosse la connessione, non si aprirebbe nemmeno la scheda del titolo, e gli altri titoli della stessa riga non partirebbero.",
    null,
    "Riconduce ogni blocco al pagamento: con l'abbonamento scaduto si chiuderebbe l'intero servizio, non un titolo solo mentre tutti gli altri restano disponibili.",
    "Sposta la causa sull'apparecchio: se il problema fosse il dispositivo, si fermerebbe qualsiasi contenuto, non esattamente quello che il cugino sta guardando altrove."
  ],
  feedback:"Il dettaglio che orienta è che il blocco riguarda un titolo solo, mentre il resto del catalogo funziona, e che la stessa persona in un altro Paese lo guarda senza problemi. Connessione, abbonamento e dispositivo spiegherebbero tutti un guasto generale, non questo. Un film o un documentario non si vendono al mondo intero in un colpo: i diritti di distribuzione si negoziano territorio per territorio, e finché per un certo Paese non è stato firmato niente, lì quel titolo non compare. È il motivo per cui gli stessi cataloghi cambiano attraversando un confine."
},

{
  id:22, area:3, dim:"3.1", oggetto:"Abilità", livello:"Intermedio", origine:"G13 q18",
  inquadramento:null,
  consegna:"Nel riquadro ci sono due versioni della stessa pagina, con lo stesso testo e gli stessi caratteri. Quale delle due può essere usata da più persone, e per quale motivo?",

/* etichetta di testo dentro un SVG, visibile solo in modalità esplicativa */

         'font-family="Atkinson Hyperlegible, sans-serif" font-size="12" fill="#5a6b7c">' +
         testo + '</text>';
}

/* ===== item 1 — i tre soggetti del modello pubblicitario ===== */

  function nodo(y, titolo, glifo, anonimo){
    /* il terzo soggetto, in modalità prova, resta senza nome e con una sagoma neutra:
       «inserzionista» è il nome tecnico di chi compra pubblicità, cioè la risposta */
    var senzaNome = anonimo && !esplicativo;
    return '' +
    '<g>' +

    {logico:0, nome:"Moduli",  icona:"moduli",

/* ===== item 12 — tracce sparse che convergono ===== */
/* In modalità prova la sagoma al centro non ha nome: nominarla è la risposta. */
STIMOLI.svgTracceIdentita = function(esplicativo){
  var e = function(testo, x, y, ancora){ return etichettaSvg(esplicativo, testo, x, y, ancora); };

  function traccia(x, y, larghezza, testo){
    return '<rect x="' + x + '" y="' + y + '" width="' + larghezza + '" height="34" rx="10" ' +
             'fill="#eef2fb" stroke="#1f5fc0" stroke-width="1.6"/>' +
           '<text x="' + (x + larghezza / 2) + '" y="' + (y + 22) + '" text-anchor="middle" ' +
             'font-family="Atkinson Hyperlegible, sans-serif" font-size="13" fill="#16233a">' +
             testo + '</text>';
  }
  /* traccia muta: in prova al posto del nome c'è solo un glifo. Cinque etichette scritte
     erano l'enumerazione con cui la risposta corretta si formula; tre bastano a mostrare
     che qualcosa converge, senza dettare le parole. */
  function tracciaMuta(x, y, larghezza, testo, glifo){
    if(esplicativo) return traccia(x, y, larghezza, testo);
    return '<rect x="' + x + '" y="' + y + '" width="' + larghezza + '" height="34" rx="10" ' +
             'fill="#eef2fb" stroke="#1f5fc0" stroke-width="1.6"/>' +
           '<g transform="translate(' + (x + larghezza / 2 - 11) + ',' + (y + 6) + ')">' +
             glifo + '</g>';
  }
  /* carrello e goccia-segnaposto: glifi generici, nessuno dei due nomina la traccia */
  var glifoCarrello =
    '<g fill="none" stroke="#1f5fc0" stroke-width="1.9" stroke-linecap="round" ' +
      'stroke-linejoin="round">' +
      '<path d="M1 2 h3.4 l3 12.2 h11.4"/>' +
      '<path d="M6.6 5.2 h15.2 l-1.6 6.6 h-12"/>' +
      '<circle cx="9" cy="19.4" r="1.9"/><circle cx="17.6" cy="19.4" r="1.9"/>' +
    '</g>';
  var glifoSegnaposto =
    '<g fill="none" stroke="#1f5fc0" stroke-width="1.9" stroke-linecap="round" ' +
      'stroke-linejoin="round">' +
      '<path d="M11 21.4 C4.6 13.4 2.6 10.6 2.6 8.4 a8.4 8.4 0 0 1 16.8 0 ' +
        'c0 2.2 -2 5 -8.4 13 z"/>' +
      '<circle cx="11" cy="8.4" r="3.1"/>' +
    '</g>';
  /* freccia da un punto verso un altro, con la punta calcolata sulla direzione */
  function verso(x1, y1, x2, y2){
    var dx = x2 - x1, dy = y2 - y1;
    var lung = Math.sqrt(dx * dx + dy * dy);
    var ux = dx / lung, uy = dy / lung;
    var px = -uy, py = ux;               /* perpendicolare, per la base della punta */
    var bx = x2 - ux * 9, by = y2 - uy * 9;
    return '<path d="M' + x1 + ' ' + y1 + ' L' + bx.toFixed(1) + ' ' + by.toFixed(1) + '" ' +
             'stroke="#1f5fc0" stroke-width="1.8" stroke-dasharray="4 4" fill="none"/>' +
           '<path d="M' + x2.toFixed(1) + ' ' + y2.toFixed(1) +
             ' L' + (bx + px * 4.5).toFixed(1) + ' ' + (by + py * 4.5).toFixed(1) +
             ' L' + (bx - px * 4.5).toFixed(1) + ' ' + (by - py * 4.5).toFixed(1) + ' Z" ' +
             'fill="#1f5fc0"/>';
  }

  return '' +
  '<svg viewBox="0 0 420 400" role="img" aria-label="' + (esplicativo
      ? 'Cinque tracce lasciate online convergono verso una sagoma di persona: un commento, una foto, una ricerca, un acquisto, la posizione'
      : 'Cinque riquadri convergono verso una sagoma di persona: tre portano scritto un commento, una foto, una ricerca; gli altri due solo un piccolo disegno') + '">' +
    '<rect width="420" height="400" fill="#ffffff"/>' +
    traccia(16, 24, 148, 'un commento') +
    traccia(256, 24, 148, 'una foto') +
    traccia(8, 178, 116, 'una ricerca') +
    tracciaMuta(296, 178, 116, 'un acquisto', glifoCarrello) +
    tracciaMuta(136, 306, 148, 'la posizione', glifoSegnaposto) +
    /* al centro: una sagoma tratteggiata, senza nome */
    '<rect x="150" y="120" width="120" height="126" rx="14" fill="#f6f8fc" stroke="#5a6b7c" ' +
      'stroke-width="1.6" stroke-dasharray="6 5"/>' +
    '<g fill="none" stroke="#123E90" stroke-width="2.6" stroke-linecap="round">' +
      '<circle cx="210" cy="163" r="21"/>' +
      '<path d="M177 228 a33 33 0 0 1 66 0"/>' +
    '</g>' +
    verso(90, 62, 163, 118) +
    verso(330, 62, 257, 118) +
    verso(126, 195, 148, 190) +
    verso(294, 195, 272, 190) +
    /* la freccia dal basso passa a sinistra: se salisse dritta al centro taglierebbe
       in due l'etichetta esplicativa */
    verso(180, 304, 192, 250) +
    e('il ritratto che ne risulta', 226, 272, 'start') +
    e('nessuna di queste tracce, da sola, dice molto', 210, 364) +
    e('di te: tutte insieme sì', 210, 380) +
  '</svg>';
};

        'fill="#f6f8fc" stroke="#123E90" stroke-width="2"/>' +
      '<g transform="translate(' + (x + 41) + ',' + (y + 12) + ')">' + glifo + '</g>' +
      '<text x="' + (x + 56) + '" y="' + (y + 66) + '" text-anchor="middle" ' +
        'font-family="Lexend, sans-serif" font-size="12" font-weight="500" ' +
        'fill="#123E90">' + nome + '</text>' +
    '</g>';
  }
  /* collegamento tratteggiato con un puntino a metà: qualcosa viaggia lì sopra */
  function filo(x1, y1, x2, y2){
    var mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    return '<path d="M' + x1 + ' ' + y1 + ' L' + x2 + ' ' + y2 + '" stroke="#1f5fc0" ' +
           'stroke-width="2" stroke-dasharray="5 5" fill="none"/>' +
           '<circle cx="' + mx + '" cy="' + my + '" r="3.4" fill="#1f5fc0"/>';
  }

  return '' +
  '<svg viewBox="0 0 420 372" role="img" aria-label="Un orologio, un termostato, una lampada e un contatore, collegati tutti quanti allo stesso punto centrale contrassegnato dal simbolo del wi-fi">' +
    '<rect width="420" height="372" fill="#ffffff"/>' +
    filo(96, 96, 186, 158) +
    filo(324, 96, 234, 158) +
    filo(96, 268, 186, 210) +
    filo(324, 268, 234, 210) +
    oggetto(20, 22, iconaOggetto("orologio"), 'Orologio') +
    oggetto(288, 22, iconaOggetto("termostato"), 'Termostato') +
    oggetto(20, 244, iconaOggetto("lampada"), 'Lampada') +
    /* il quarto oggetto porta la sua identità concreta, non la categoria: «Sensore»
       è una delle parole con cui la risposta corretta si formula */
    oggetto(288, 244, iconaOggetto("sensore"), 'Contatore') +
    /* il punto di rete al centro */
    '<circle cx="210" cy="184" r="44" fill="#eef2fb" stroke="#123E90" stroke-width="2"/>' +
    '<g fill="none" stroke="#123E90" stroke-width="2.4" stroke-linecap="round">' +
      '<path d="M195 178 a21 21 0 0 1 30 0"/>' +

    '</g>' +
    '<circle cx="210" cy="195" r="3.2" fill="#123E90"/>' +
    /* il nodo centrale non è nominato: il glifo wi-fi dice già che cos'è, mentre la
       parola «rete» è una di quelle con cui la risposta corretta si formula */
    /* le etichette dei fili stanno appena fuori dai riquadri, non al centro:
       al centro si sovrapponevano fra loro e al nome della rete */
    e('passi contati', 76, 120) +
    e('temperatura', 344, 120) +

    e('a misurare e a mandare i dati da soli', 210, 356) +
  '</svg>';
};

/* ===== item 19 — la griglia di volo del drone ===== */
/* In modalità prova la griglia mostra dove si parte, dove si arriva e che cosa c'è in
   mezzo: il percorso NON è tracciato, perché tracciarlo è esattamente la risposta. */
STIMOLI.svgGrigliaDrone = function(esplicativo){
  var LATO = 56, X0 = 64, YB = 314;   /* YB = bordo inferiore della griglia */
  function cx(col){ return X0 + (col - 1) * LATO + LATO / 2; }
  function cy(rig){ return YB - rig * LATO + LATO / 2; }

  var griglia = '';
  for(var c=0;c<=5;c++)
    griglia += '<path d="M' + (X0 + c * LATO) + ' ' + (YB - 280) + ' V' + YB + '" ' +
               'stroke="#d6e1f2" stroke-width="1.5"/>';
  for(var r=0;r<=5;r++)
    griglia += '<path d="M' + X0 + ' ' + (YB - r * LATO) + ' H' + (X0 + 280) + '" ' +
               'stroke="#d6e1f2" stroke-width="1.5"/>';

  /* ostacolo: casella occupata, con il segno di sbarramento */
  function ostacolo(col, rig){
    var x = X0 + (col - 1) * LATO, y = YB - rig * LATO;
    return '<rect x="' + (x + 4) + '" y="' + (y + 4) + '" width="' + (LATO - 8) + '" height="' +
             (LATO - 8) + '" rx="7" fill="#dde5f2" stroke="#5a6b7c" stroke-width="1.6"/>' +
           '<g stroke="#5a6b7c" stroke-width="2.2" stroke-linecap="round">' +
             '<path d="M' + (x + 17) + ' ' + (y + 17) + ' L' + (x + 39) + ' ' + (y + 39) + '"/>' +
             '<path d="M' + (x + 39) + ' ' + (y + 17) + ' L' + (x + 17) + ' ' + (y + 39) + '"/>' +
           '</g>';
  }
  /* drone visto dall'alto: corpo e quattro eliche */
  function drone(px, py){
    return '<g transform="translate(' + px + ',' + py + ')">' +
      '<g fill="none" stroke="#123E90" stroke-width="2.2" stroke-linecap="round">' +
        '<path d="M-9 -9 L-15 -15"/><path d="M9 -9 L15 -15"/>' +
        '<path d="M-9 9 L-15 15"/><path d="M9 9 L15 15"/>' +
        '<circle cx="-16" cy="-16" r="5"/><circle cx="16" cy="-16" r="5"/>' +
        '<circle cx="-16" cy="16" r="5"/><circle cx="16" cy="16" r="5"/>' +
      '</g>' +
      '<rect x="-10" y="-10" width="20" height="20" rx="5" fill="#123E90"/>' +
    '</g>';
  }
  /* piazzola di atterraggio: due cerchi concentrici */
  function piazzola(px, py){
    return '<g transform="translate(' + px + ',' + py + ')" fill="none" stroke="#1B6D3F" ' +
             'stroke-width="2.6">' +
             '<circle cx="0" cy="0" r="19"/><circle cx="0" cy="0" r="9"/>' +
           '</g>' +
           '<circle cx="' + px + '" cy="' + py + '" r="3.4" fill="#1B6D3F"/>';
  }

  /* percorso corretto: 1 in alto, 4 a destra, 2 in alto — solo in modalità esplicativa */
  var percorso = '';
  if(esplicativo){
    percorso =
      '<path d="M' + cx(1) + ' ' + cy(1) + ' V' + cy(2) + ' H' + cx(5) + ' V' + (cy(4) + 16) + '" ' +
        'stroke="#B8860B" stroke-width="4.5" fill="none" stroke-linecap="round" ' +
        'stroke-linejoin="round"/>' +
      '<path d="M' + (cx(5) - 7) + ' ' + (cy(4) + 22) + ' L' + cx(5) + ' ' + (cy(4) + 8) +
        ' L' + (cx(5) + 7) + ' ' + (cy(4) + 22) + ' Z" fill="#B8860B"/>' +
      '<circle cx="' + cx(1) + '" cy="' + cy(2) + '" r="4.5" fill="#B8860B"/>' +
      '<circle cx="' + cx(5) + '" cy="' + cy(2) + '" r="4.5" fill="#B8860B"/>';
  }

  /* legenda: dice che cosa sono i tre segni, non dove passare */
  function vocelegenda(x, glifo, testo){
    return glifo +
      '<text x="' + (x + 26) + '" y="' + 356 + '" font-family="Atkinson Hyperlegible, sans-serif" ' +
        'font-size="12" fill="#5a6b7c">' + testo + '</text>';
  }

  return '' +
  '<svg viewBox="0 0 420 380" role="img" aria-label="Una griglia di cinque caselle per cinque, con la casella di partenza in basso a sinistra, la piazzola di atterraggio in alto a destra e tre caselle occupate da ostacoli">' +
    '<rect width="420" height="380" fill="#ffffff"/>' +
    griglia +
    ostacolo(3, 1) + ostacolo(2, 3) + ostacolo(2, 4) +
    percorso +
    drone(cx(1), cy(1)) +
    piazzola(cx(5), cy(4)) +
    /* legenda, sempre visibile */
    vocelegenda(20,
      '<g transform="translate(32,352) scale(0.42)">' +
        '<g fill="none" stroke="#123E90" stroke-width="4.6" stroke-linecap="round">' +
        '<circle cx="-16" cy="-16" r="5"/><circle cx="16" cy="-16" r="5"/>' +
        '<circle cx="-16" cy="16" r="5"/><circle cx="16" cy="16" r="5"/></g>' +
        '<rect x="-10" y="-10" width="20" height="20" rx="5" fill="#123E90"/></g>',
      'partenza') +
    vocelegenda(140,
      '<g transform="translate(152,352)" fill="none" stroke="#1B6D3F" stroke-width="2.2">' +
        '<circle cx="0" cy="0" r="8.5"/><circle cx="0" cy="0" r="3.6"/></g>',
      'atterraggio') +
    vocelegenda(276,
      '<g transform="translate(288,352)">' +
        '<rect x="-9" y="-9" width="18" height="18" rx="4" fill="#dde5f2" ' +
          'stroke="#5a6b7c" stroke-width="1.4"/>' +
        '<g stroke="#5a6b7c" stroke-width="1.8" stroke-linecap="round">' +
          '<path d="M-4.5 -4.5 L4.5 4.5"/><path d="M4.5 -4.5 L-4.5 4.5"/></g></g>',
      'ostacolo') +
  '</svg>';
};

/* ===== item 23 — la licenza dell'opera, in simboli ===== */
/* In modalità prova ci sono il simbolo e la struttura della licenza, non che cosa
   permette e che cosa obbliga: quello si legge nella restituzione. */
STIMOLI.svgLicenzaCC = function(esplicativo){
  /* riga: il simbolo a sinistra, e a destra ciò che comporta.
     Anche in prova i due termini nudi sono scritti: «BY» non è una sigla che uno studente
     di terza media possa ricavare da sé, e senza di essi l'item verificherebbe una
     conoscenza pregressa specialistica invece di un ragionamento. Le conseguenze estese
     — lo scopo commerciale, che cosa accade senza attribuzione — restano all'esplicativo. */
  function riga(y, simbolo, breve, riga1, riga2){
    var testo = esplicativo
      ? '<text x="92" y="' + (y + 20) + '" font-family="Atkinson Hyperlegible, sans-serif" ' +
          'font-size="12.5" fill="#16233a">' + riga1 + '</text>' +
        '<text x="92" y="' + (y + 37) + '" font-family="Atkinson Hyperlegible, sans-serif" ' +
          'font-size="12.5" fill="#16233a">' + riga2 + '</text>'
      : '<text x="92" y="' + (y + 30) + '" font-family="Atkinson Hyperlegible, sans-serif" ' +
          'font-size="13.5" fill="#16233a">' + breve + '</text>';
    return '<rect x="76" y="' + y + '" width="326" height="48" rx="9" ' +
             'fill="#f6f8fc" stroke="#d6e1f2" stroke-width="1.6"/>' +
           '<g transform="translate(44,' + (y + 24) + ')">' + simbolo + '</g>' +
           testo;
  }

  /* i due simboli della licenza, disegnati a mano: nessun logo scaricato */
  var simboloCC =
    '<circle cx="0" cy="0" r="17" fill="none" stroke="#123E90" stroke-width="2.2"/>' +
    '<text x="0" y="5" text-anchor="middle" font-family="Lexend, sans-serif" ' +
      'font-size="13" font-weight="700" fill="#123E90">CC</text>';
  var simboloBy =
    '<circle cx="0" cy="0" r="17" fill="none" stroke="#123E90" stroke-width="2.2"/>' +
    '<g fill="none" stroke="#123E90" stroke-width="2.2" stroke-linecap="round">' +
      '<circle cx="0" cy="-6" r="4"/>' +
      '<path d="M-7 9 a7 7 0 0 1 14 0"/>' +
    '</g>';

  return '' +
  '<svg viewBox="0 0 420 340" role="img" aria-label="Un\'illustrazione, la targhetta della sua licenza con due simboli, e sotto i due simboli ripresi uno per riga">' +
    '<rect width="420" height="340" fill="#ffffff"/>' +
    /* l\'opera */
    '<rect x="152" y="12" width="116" height="86" rx="10" fill="#f6f8fc" ' +
      'stroke="#123E90" stroke-width="2"/>' +
    '<g fill="none" stroke="#8fa2bd" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M164 84 l22 -26 l16 17 l12 -13 l24 22"/>' +
      '<circle cx="178" cy="40" r="7"/>' +
    '</g>' +
    /* la targhetta della licenza, attaccata all\'opera */
    '<path d="M210 98 V116" stroke="#123E90" stroke-width="2" fill="none"/>' +
    '<rect x="104" y="116" width="212" height="56" rx="28" fill="#eef2fb" ' +
      'stroke="#123E90" stroke-width="2"/>' +
    '<g transform="translate(140,144)">' + simboloCC + '</g>' +
    '<g transform="translate(186,144)">' + simboloBy + '</g>' +
    '<text x="216" y="151" font-family="Lexend, sans-serif" font-size="19" ' +
      'font-weight="700" fill="#123E90">CC BY</text>' +
    /* i due simboli ripresi uno per riga, con lo spazio di ciò che comportano */
    riga(198, simboloCC, 'si può riusare',
         'si può copiare, modificare e riusare,',
         'senza limiti sullo scopo') +
    riga(258, simboloBy, 'va indicato l\'autore',
         'a una sola condizione: indicare sempre',
         'chi l\'ha realizzata, quando viene ricondivisa') +
  '</svg>';
};

/* ===== item 18 — il foglio di esportazione e i suoi quattro formati (hotspot) ===== */
/* I quattro formati sono elencati con il solo nome e l'estensione: che cosa ciascuno
   conservi o lasci modificabile è la risposta, e compare solo in modalità esplicativa. */
STIMOLI.mkFormatiEsportazione = function(esplicativo, sceltaCorrente){
  var iconaDoc = '<svg viewBox="0 0 24 24" width="21" height="21" aria-hidden="true">' +
    '<g fill="none" stroke="#123E90" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">' +
    '<path d="M6 3 h8 l5 5 v13 a1 1 0 0 1 -1 1 h-12 a1 1 0 0 1 -1 -1 v-17 a1 1 0 0 1 1 -1 z"/>' +
    '<path d="M14 3 v5 h5"/></g></svg>';

  var formati = [
    {logico:0, nome:"Pages",         est:".pages",
     nota:"resta modificabile, e si apre solo dove c\'è quest\'app"},
    {logico:2, nome:"Word",          est:".docx",
     nota:"si apre quasi ovunque, ma resta un documento da scrivere"},
    {logico:1, nome:"PDF",           est:".pdf",
     nota:"impaginazione fissata: si vede uguale ovunque e non si riscrive"},
    {logico:3, nome:"Testo semplice", est:".txt",
     nota:"solo i caratteri: perde impaginazione, immagini e tabelle"}
  ];

  var h = '<div class="mk">' +
          '<div class="barra-fin">' +
            '<span class="pallino"></span><span class="pallino"></span><span class="pallino"></span>' +
            '<span class="etichetta">Pages · Relazione di geografia</span></div>' +
          '<p class="intestazione-pannello">Esporta il documento.<br>Scegli il formato:</p>' +
          '<div class="corpo elenco-formati" style="padding:8px 0 0">';
  for(var i=0;i<formati.length;i++){
    var dentro = '<span class="formato">' + iconaDoc +
                 '<span class="testa-formato">' +
                   '<span class="nome-formato">' + formati[i].nome + '</span>' +
                   '<span class="estensione">' + formati[i].est + '</span>' +
                 '</span>' +
                 (esplicativo ? '<span class="glossa-dx">' + formati[i].nota + '</span>' : '') +
                 '</span>';
    h += hotspot(formati[i].logico, dentro, sceltaCorrente === formati[i].logico);
  }
  return h + '</div></div>';
};

    /* server: due unità impilate */

           '<path d="M7 7.5 h.2"/><path d="M7 17.5 h.2"/></g>';
  }

      : 'Lo stesso messaggio in quattro punti del percorso: in ciascuno appare come una fila di blocchi indistinti') + '">' +

var Livelli = (function(){
  var ORDINE = ["In via di prima acquisizione", "Base", "Intermedio", "Avanzato"];

  // soglie: 2/3 arrotondato per eccesso sul totale di item di quel livello
  function soglia(totale){ return Math.ceil(totale * 2 / 3); }

  function scala(corretti, totali){
    if(corretti.Base < soglia(totali.Base)) return ORDINE[0];
    if(corretti.Intermedio < soglia(totali.Intermedio)) return ORDINE[1];
    if(corretti.Avanzato < soglia(totali.Avanzato)) return ORDINE[2];
    return ORDINE[3];
  }

  return {

    soglia: soglia,

      return scala(corretti, {Base:12, Intermedio:12, Avanzato:8});
    },
    area: function(corretti){

    }
  };
})();

/* ===== SHUFFLE ===== */
var Shuffle = (function(){
  // PRNG deterministico: mulberry32. Serve determinismo per riprodurre un tentativo.
  function rng(seed){
    var t = seed >>> 0;
    return function(){
      t = (t + 0x6D2B79F5) >>> 0;
      var r = Math.imul(t ^ (t >>> 15), 1 | t);
      r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
      return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
  }

  // restituisce un array p dove p[posizioneMostrata] = indiceLogico
  function permuta(n, seed){
    var p = [], i;
    for(i=0;i<n;i++) p.push(i);
    var next = rng(seed);
    for(i = n - 1; i > 0; i--){
      var j = Math.floor(next() * (i + 1));
      var tmp = p[i]; p[i] = p[j]; p[j] = tmp;
    }
    return p;
  }

  function posizioneDi(p, indiceLogico){
    for(var i=0;i<p.length;i++) if(p[i] === indiceLogico) return i;
    return -1;
  }

  // un seed per studente, stabile dentro il tentativo
  function seedTentativo(){
    return Math.floor(Math.random() * 2147483647);
  }

  return {permuta:permuta, posizioneDi:posizioneDi, seedTentativo:seedTentativo};
})();

var Video = (function(){
  var ID = "bD3Y-SCOu5Q";
  var player = null, timer = null, durata = 0;

  function html(){

    '<div class="card">' +

          '<svg class="play" viewBox="0 0 74 74" aria-label="Avvia il video">' +
            '<circle cx="37" cy="37" r="36" fill="#fff" opacity=".92"/>' +
            '<path d="M30 24l22 13-22 13z" fill="#123E90"/></svg>' +
        '</div>' +
        '<div class="v-end" id="vend">' +
          '<strong>Video terminato</strong>' +
          '<button class="btn secondario" id="rivedi">Rivedi</button>' +
        '</div>' +
      '</div>' +
      '<div class="comandi">' +
        '<button id="pp" aria-label="Play o pausa">' +
          '<svg viewBox="0 0 24 24" width="20" height="20"><path d="M8 5l11 7-11 7z" ' +
          'fill="currentColor"/></svg></button>' +
        '<div class="barra" id="barra"><div class="avanz" id="avanz"></div></div>' +
        '<span class="tempo" id="tempo">0:00 / 0:00</span>' +
      '</div>' +
      '<p style="margin-top:18px"><button class="btn" id="vai">Vai alla prova</button></p>' +
    '</div>';
  }

  function mmss(s){
    s = Math.max(0, Math.floor(s));
    return Math.floor(s/60) + ":" + (s%60 < 10 ? "0" : "") + (s%60);
  }

  function monta(){
    var tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = function(){
      player = new YT.Player("yt", {
        videoId: ID,
        playerVars: {controls:0, disablekb:1, rel:0, iv_load_policy:3,
                     playsinline:1, enablejsapi:1, modestbranding:1},
        events: {onReady: pronto, onStateChange: statoCambiato}
      });
    };
  }

  function pronto(){
    durata = player.getDuration();
    document.getElementById("tempo").textContent = "0:00 / " + mmss(durata);
  }

  function statoCambiato(e){
    if(e.data === YT.PlayerState.PLAYING){
      document.getElementById("poster").style.display = "none";
      document.getElementById("vend").classList.remove("on");
      if(!timer) timer = setInterval(tick, 250);
    }
    if(e.data === YT.PlayerState.ENDED){
      document.getElementById("vend").classList.add("on");
      clearInterval(timer); timer = null;
    }
  }

  function tick(){
    if(!player || !player.getCurrentTime) return;
    var t = player.getCurrentTime();
    if(!durata) durata = player.getDuration();
    document.getElementById("avanz").style.width =
      (durata ? (t / durata * 100) : 0) + "%";
    document.getElementById("tempo").textContent = mmss(t) + " / " + mmss(durata);
  }

  function lega(){
    document.getElementById("poster").addEventListener("click", function(){
      player && player.playVideo();
    });
    document.getElementById("pp").addEventListener("click", function(){
      if(!player) return;
      var s = player.getPlayerState();
      if(s === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
    });
    document.getElementById("barra").addEventListener("click", function(ev){
      if(!player || !durata) return;
      var r = this.getBoundingClientRect();
      player.seekTo(durata * ((ev.clientX - r.left) / r.width), true);
    });
    document.getElementById("rivedi").addEventListener("click", function(){
      player && player.seekTo(0, true);
      player && player.playVideo();
    });
    document.getElementById("vai").addEventListener("click", function(){
      Stato.vaiA("identificazione");
    });
  }

  return {html:html, monta:monta, lega:lega};
})();

var Stato = (function(){
  var s = {
    schermata: "video",
    dati: {nome:"", cognome:"", classe:""},
    seed: 0,
    permutazioni: [],     // permutazioni[i] = array p per l'item i
    risposte: [],         // risposte[i] = indice LOGICO scelto, oppure null
    corrente: 0,

  function iniziaProva(){
    s.seed = Shuffle.seedTentativo();
    s.permutazioni = [];
    s.risposte = [];
    for(var i=0;i<ITEMS.length;i++){
      s.permutazioni.push(Shuffle.permuta(4, s.seed + ITEMS[i].id));
      s.risposte.push(null);
    }
    s.corrente = 0;
    s.inizio = new Date().getTime();
    vaiA("prova");
  }

  function rispondi(indiceItem, indiceLogico){
    s.risposte[indiceItem] = indiceLogico;
  }

  function contaRisposte(){
    var n = 0;
    for(var i=0;i<s.risposte.length;i++) if(s.risposte[i] !== null) n++;
    return n;
  }

  function tutteRisposte(){ return contaRisposte() === ITEMS.length; }

  function esiti(){
    var e = [];
    for(var i=0;i<ITEMS.length;i++)
      e.push(s.risposte[i] !== null && s.risposte[i] === ITEMS[i].corretta ? 1 : 0);
    return e;
  }

  function conteggi(filtroArea){
    var c = {Base:0, Intermedio:0, Avanzato:0};
    var e = esiti();
    for(var i=0;i<ITEMS.length;i++){
      if(filtroArea && ITEMS[i].area !== filtroArea) continue;
      if(e[i]) c[ITEMS[i].livello]++;
    }
    return c;
  }

  function risultato(){
    var aree = {};
    for(var a=1;a<=4;a++) aree[a] = Livelli.area(conteggi(a));
    return {
      globale: Livelli.globale(conteggi(null)),
      aree: aree,
      esiti: esiti(),
      durata: Math.round((s.fine - s.inizio) / 1000)
    };
  }

  function vaiA(nome){ s.schermata = nome; Render.disegna(); }

  return {
    dati: s.dati, s: s,
    iniziaProva: iniziaProva, rispondi: rispondi, vaiA: vaiA,
    contaRisposte: contaRisposte, tutteRisposte: tutteRisposte,
    esiti: esiti, conteggi: conteggi, risultato: risultato,
    chiudi: function(){ s.fine = new Date().getTime(); }
  };
})();

function mappaHtml(){
  var h = '<nav class="mappa" aria-label="Mappa delle domande">';
  for(var i=0;i<ITEMS.length;i++){
    var cls = "q";
    if(Stato.s.risposte[i] !== null) cls += " fatta";
    if(i === Stato.s.corrente) cls += " qui";
    h += '<button class="' + cls + '" data-vai="' + i + '" ' +
         'aria-label="Domanda ' + (i+1) + (Stato.s.risposte[i] !== null ?
         ", già risposta" : ", senza risposta") + '">' + (i+1) + '</button>';
  }
  h += '</nav>';
  return h;
}

/* ===== RENDER ITEM ===== */
var LETTERE = ["A","B","C","D"];

function nomeArea(a){
  return ["", "Informazione e dati", "Comunicazione e collaborazione",
          "Creazione di contenuti", "Sicurezza"][a];
}

function itemHtml(i){
  var it = ITEMS[i];
  var p = Stato.s.permutazioni[i];
  var h = '<div class="split">';

  h += '<div class="quesito">';
  h += '<span class="tag">Domanda ' + (i+1) + ' di 32 · ' + nomeArea(it.area) + '</span>';
  if(it.inquadramento)
    h += '<div class="inquadramento">' + it.inquadramento + '</div>';
  h += '<p class="domanda">' + it.consegna + '</p>';

  if(it.stimolo.hotspot){
    h += '<p class="lead" style="font-size:17px">Tocca direttamente l\'elemento giusto ' +
         'nel riquadro qui accanto.</p></div>';
    h += '<aside class="stimolo"><h3>' + it.stimolo.titolo + '</h3>' +
         STIMOLI[it.stimolo.render](false, Stato.s.risposte[i]) + '</aside>';
  } else {
    h += '<ul class="opzioni">';
    for(var pos=0; pos<4; pos++){
      var logico = p[pos];
      var sel = Stato.s.risposte[i] === logico ? " scelta" : "";
      h += '<li><button class="opz' + sel + '" data-logico="' + logico + '">' +
           '<span class="lettera">' + LETTERE[pos] + '</span>' +
           '<span>' + it.opzioni[logico] + '</span></button></li>';
    }
    h += '</ul></div>';
    h += '<aside class="stimolo"><h3>' + it.stimolo.titolo + '</h3>' +
         STIMOLI[it.stimolo.render](false) + '</aside>';
  }

  h += '</div>';
  return h;
}
